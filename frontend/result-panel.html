<!-- result-panel.html — wspólny szablon HTML wyników symulacji
     Wstrzykiwany server-side przez FastAPI (_render_with_panel).
     Wymaga kontekstu Alpine: ResultPanel(jobId, opts)
     UWAGA: wszystkie wyrażenia na result.* muszą mieć guard result &&
     bo Alpine ewaluuje je zanim result zostanie załadowany (x-show nie blokuje ewaluacji)
-->

<!-- TOP GRID: lewa (DPS hero + meta) | prawa (Items) -->
<div class="result-top-grid">

  <!-- LEWA: pionowy układ -->
  <div class="result-top-left" style="display:flex;flex-direction:column;gap:0">

    <!-- 1. Duży DPS + ±std w jednej linii -->
    <div style="display:flex;align-items:baseline;gap:.6rem;flex-wrap:wrap;margin-bottom:1.1rem">
      <div class="dps-value" x-text="'\u2694\ufe0f ' + formatDps(resultMetric().value)"></div>
      <span style="font-size:.88rem;color:var(--muted);white-space:nowrap" x-text="'\xb1' + formatDps(resultMetric().std) + ' ' + $store.i18n.t('result.dps')"></span>
    </div>

    <!-- 2. Fight style -->
    <template x-if="meta && meta.fight_style">
      <div style="margin-bottom:1.1rem">
        <span style="color:var(--muted);font-size:.88rem" x-text="meta.fight_style"></span>
      </div>
    </template>

    <!-- 3. Plakietka postaci + ilvl -->
    <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem">
      <template x-if="meta && meta.character_name && meta.character_name !== 'Addon Export'">
        <a :href="armoryUrl() || '#'" :target="armoryUrl() ? '_blank' : '_self'" rel="noopener"
          :style="{background:classColor(meta.character_class),color:classTextColor(meta.character_class),padding:'.25rem .8rem',borderRadius:'999px',fontWeight:'700',fontSize:'.88rem',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:'.3rem'}">
          <span x-text="meta.character_name + (meta.character_spec||meta.character_class ? ' \xb7 '+(meta.character_spec?meta.character_spec+' ':'')+(meta.character_class||'') : '')"></span>
          <span style="font-size:.75rem;opacity:.8" x-text="armoryLabel()"></span>
        </a>
      </template>
      <template x-if="result && result.avg_item_level">
        <span class="ilvl-badge" x-text="'\u2694 ' + result.avg_item_level + ' ilvl'"></span>
      </template>
    </div>

    <!-- 4. Talenty -->
    <template x-if="meta && meta.talents">
      <div style="margin-bottom:1.1rem">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
          <span style="font-size:.8rem;color:var(--muted);white-space:nowrap" x-text="$store.i18n.t('result.talents_label')"></span>
          <code class="talents-string" x-text="meta.talents"></code>
          <button class="btn btn-ghost btn-sm" @click="copyTalents()"
            x-text="talentsCopied ? $store.i18n.t('result.talents_copied') : $store.i18n.t('result.talents_copy')"></button>
          <button class="btn btn-ghost btn-sm" @click="copyTalentsForGame()"
            style="border-color:var(--accent2);color:var(--accent2)"
            x-text="talentsGameCopied ? $store.i18n.t('result.talents_ready') : $store.i18n.t('result.talents_import_ingame')">
          </button>
        </div>
        <template x-if="talentsGameCopied">
          <div style="margin-top:.4rem;font-size:.78rem;color:var(--muted);padding:.35rem .6rem;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border)"
            x-text="$store.i18n.t('result.talents_hint_ingame')">
          </div>
        </template>
      </div>
    </template>

    <!-- 5. Profil autora -->
    <template x-if="meta && meta.author_bnet_id">
      <div style="margin-bottom:1.1rem">
        <a :href="'/u/' + encodeURIComponent(meta.author_bnet_id)"
          style="display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .8rem;border-radius:999px;font-size:.85rem;font-weight:600;text-decoration:none;background:var(--surface);border:1px solid var(--border);color:var(--muted);transition:color .15s,border-color .15s"
          @mouseenter="$el.style.color='var(--text)';$el.style.borderColor='var(--accent2)'"
          @mouseleave="$el.style.color='var(--muted)';$el.style.borderColor='var(--border)'">
          &#128100; <span x-text="$store.i18n.t('result.author_profile')"></span>
        </a>
      </div>
    </template>

    <!-- 6. Akcje (tylko showFooter=true, czyli /result/) -->
    <template x-if="options.showFooter">
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
        <button class="btn" style="font-size:.8rem;padding:.35rem .9rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer"
          @click="copyShare()" x-text="copied?'\u2713 '+$store.i18n.t('common.copied'):'&#128279; '+$store.i18n.t('result.share_result')"></button>
        <a href="/" class="btn" style="font-size:.8rem;padding:.35rem .9rem;background:var(--accent);color:#000;border:none;border-radius:4px;text-decoration:none"
          x-text="'\u2694\ufe0f '+$store.i18n.t('result.simulate_cta')"></a>
      </div>
    </template>

  </div>
  <!-- KONIEC LEWEJ -->

  <!-- PRAWA: Items — kompaktowa lista 2-kolumnowa -->
  <template x-if="result && result.items && result.items.length > 0">
    <div class="result-top-right">
      <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem">
        <h2 style="margin:0" x-text="$store.i18n.t('result.items_title')"></h2>
        <span style="font-size:.78rem;color:var(--muted)" x-text="'(' + result.items.length + ' ' + $store.i18n.t('result.slots_count').replace('{{n}}','').trim() + ')'"></span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.2rem .8rem">
        <template x-for="item in result.items" :key="item.slot">
          <div style="display:flex;align-items:center;gap:.45rem;min-width:0;padding:.2rem 0">

            <!-- Ikona 22px -->
            <template x-if="item.id > 0">
              <a :href="'https://www.wowhead.com/item=' + item.id" target="_blank" rel="noopener"
                style="display:inline-flex;flex-shrink:0;width:22px;height:22px;border-radius:3px;overflow:hidden;border:1px solid var(--border);text-decoration:none">
                <img
                  :src="item.icon ? '/api/icon/' + item.icon + '.jpg' : '/api/icon-by-item/' + item.id"
                  :alt="item.name"
                  style="width:100%;height:100%;object-fit:cover;display:block"
                  @error="$el.src='/api/icon-by-item/'+item.id;$el.onerror=null"
                  loading="lazy"/>
              </a>
            </template>
            <template x-if="!item.id || item.id <= 0">
              <div style="width:22px;height:22px;flex-shrink:0;border-radius:3px;background:var(--surface);border:1px solid var(--border)"></div>
            </template>

            <!-- Treść: nazwa + ilvl -->
            <div style="flex:1;min-width:0;display:flex;align-items:baseline;gap:.35rem">
              <span style="font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)" x-text="item.name || '\u2014'"></span>
              <template x-if="item.item_level > 0">
                <span style="font-size:.72rem;font-weight:700;color:var(--accent);flex-shrink:0" x-text="item.item_level"></span>
              </template>
            </div>

            <!-- Gems + enchant dots -->
            <div style="display:flex;gap:2px;align-items:center;flex-shrink:0">
              <template x-if="item.gems && item.gems.length > 0">
                <span style="display:inline-flex;gap:2px">
                  <template x-for="g in item.gems" :key="g.id">
                    <a :href="'https://www.wowhead.com/item=' + g.id" target="_blank" rel="noopener"
                      style="width:7px;height:7px;border-radius:50%;background:#9c27b0;display:inline-block;border:1px solid rgba(255,255,255,.25)"
                      :title="g.name || ('Gem #' + g.id)"></a>
                  </template>
                </span>
              </template>
              <template x-if="item.enchant">
                <span style="width:7px;height:7px;border-radius:50%;background:#4caf50;display:inline-block;border:1px solid rgba(255,255,255,.25)"
                  :title="item.enchant.name || ('Enchant #' + item.enchant.id)"></span>
              </template>
            </div>

          </div>
        </template>
      </div>
    </div>
  </template>
  <!-- KONIEC PRAWEJ -->

</div>
<!-- KONIEC TOP GRID -->

<!-- Reakcje -->
<template x-if="options.showReactions">
  <div class="reactions-bar">
    <template x-for="key in reactionKeys" :key="key">
      <button class="reaction-btn" :class="{active:myReaction===key}" @click="react(key)"
        :title="sessionId?(myReaction===key?$store.i18n.t('result.reaction_remove'):$store.i18n.t('result.reaction_add')):$store.i18n.t('result.reaction_login')"
        :disabled="!sessionId||reactionLoading">
        <span x-text="emojiMap[key]||key"></span>
        <span class="count" x-text="reactionCounts[key]||0"></span>
      </button>
    </template>
    <span x-show="!sessionId" class="reaction-login-hint">
      &#128273; <a href="/auth/login" style="color:var(--accent2)" x-text="$store.i18n.t('common.login_short')"></a>,
      <span x-text="$store.i18n.t('result.reaction_login').toLowerCase()"></span>
    </span>
  </div>
</template>

<!-- Grid: stats + spelle -->
<template x-if="result && result.stats">
  <div class="result-grid">
    <div>
      <h2 style="margin-bottom:.6rem" x-text="$store.i18n.t('result.stats')"></h2>
      <div class="stat-list">
        <template x-for="[key,val] in Object.entries(result.stats)" :key="key">
          <div class="stat-row">
            <span class="stat-name" x-text="formatStatName(key)"></span>
            <span class="stat-val" x-text="formatStatValue(key, val)"></span>
          </div>
        </template>
      </div>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
        <h2 x-text="$store.i18n.t('result.spell_breakdown')"></h2>
        <div style="display:flex;gap:.3rem">
          <button class="tab" :class="{active:spellSort==='total_dmg'}" @click="spellSort='total_dmg'" style="font-size:.75rem;padding:.25rem .6rem" x-text="$store.i18n.t('result.total_dmg')"></button>
          <button class="tab" :class="{active:spellSort==='dps'}" @click="spellSort='dps'" style="font-size:.75rem;padding:.25rem .6rem" x-text="$store.i18n.t('result.dps')"></button>
        </div>
      </div>
      <div class="spell-list">
        <template x-for="sp in sortedSpells" :key="sp.name">
          <div class="spell-row">
            <div style="display:grid;grid-template-columns:6fr 2fr 2fr;align-items:center;gap:.3rem;padding:.35rem 0 .2rem">
              <div style="display:flex;align-items:center;gap:.5rem;min-width:0">
                <template x-if="sp.spell_id > 0">
                  <a class="spell-icon-wrap" :href="'https://www.wowhead.com/spell=' + sp.spell_id" target="_blank" rel="noopener">
                    <img :src="'/api/icon-by-spell/' + sp.spell_id" :alt="sp.name" @error="$el.parentElement.style.display='none'" loading="lazy"/>
                  </a>
                </template>
                <template x-if="!sp.spell_id && sp.icon && sp.icon !== 'inv_misc_questionmark'">
                  <img class="spell-icon" :src="'/api/icon/' + sp.icon + '.jpg'" :alt="sp.name" @error="$el.style.display='none'" loading="lazy"/>
                </template>
                <span x-text="sp.name" style="font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
              </div>
              <div style="font-size:.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                <span x-show="spellSort==='total_dmg'">
                  <strong x-text="formatDmg(sp.total_dmg)"></strong><span style="color:var(--muted);font-size:.78rem" x-text="' ('+sp.dmg_pct+'%)'"></span>
                </span>
                <span x-show="spellSort==='dps'">
                  <strong x-text="formatDps(sp.dps)"></strong><span style="color:var(--muted);font-size:.78rem" x-text="' '+$store.i18n.t('result.dps')"></span><span style="color:var(--muted);font-size:.78rem" x-text="' ('+sp.dps_pct+'%)'"></span>
                </span>
              </div>
              <div style="font-size:.78rem;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" x-text="sp.crit_pct+'% '+$store.i18n.t('result.spell_crit')"></div>
            </div>
            <div class="spell-bar-bg"><div class="spell-bar-fill" :style="{width:pctBarWidth(sp[spellSort],sortedSpells,spellSort)}"></div></div>
          </div>
        </template>
      </div>
    </div>
  </div>
</template>

<!-- Buffs: grid constant | uptime -->
<template x-if="result && result.buffs && result.buffs.length > 0">
  <div class="buffs-section">
    <h2 style="margin-bottom:.6rem">&#9889; <span x-text="$store.i18n.t('result.buffs_title')"></span></h2>
    <div class="result-grid">
      <div>
        <h3 style="margin:0 0 .5rem;font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em" x-text="$store.i18n.t('result.buffs_constant')"></h3>
        <div class="stat-list">
          <template x-for="b in result.buffs.filter(b => b.kind === 'constant')" :key="b.name">
            <div class="stat-row">
              <span class="stat-name" style="display:flex;align-items:center;gap:.4rem">
                <template x-if="b.spell_id > 0">
                  <a :href="'https://www.wowhead.com/spell=' + b.spell_id" target="_blank" rel="noopener" style="display:inline-flex;flex-shrink:0">
                    <img :src="'/api/icon-by-spell/' + b.spell_id" :alt="b.name"
                      style="width:16px;height:16px;border-radius:3px;object-fit:cover"
                      @error="$el.parentElement.style.display='none'" loading="lazy"/>
                  </a>
                </template>
                <template x-if="!b.spell_id || b.spell_id <= 0">
                  <img :src="'/api/icon/' + b.icon + '.jpg'" :alt="b.name"
                    style="width:16px;height:16px;border-radius:3px;object-fit:cover;flex-shrink:0"
                    @error="$el.style.display='none'" loading="lazy"/>
                </template>
                <span x-text="b.name"></span>
              </span>
            </div>
          </template>
          <template x-if="result.buffs.filter(b => b.kind === 'constant').length === 0">
            <div style="color:var(--muted);font-size:.8rem;padding:.3rem 0">&#8212;</div>
          </template>
        </div>
      </div>
      <div>
        <h3 style="margin:0 0 .5rem;font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em" x-text="$store.i18n.t('result.buffs_uptime')"></h3>
        <div class="buff-list">
          <template x-for="b in result.buffs.filter(b => b.kind !== 'constant')" :key="b.name">
            <div class="buff-row">
              <div style="display:grid;grid-template-columns:22px 1fr auto;gap:.5rem;align-items:center;margin-bottom:.18rem">
                <template x-if="b.spell_id > 0">
                  <a class="spell-icon-wrap" :href="'https://www.wowhead.com/spell=' + b.spell_id" target="_blank" rel="noopener">
                    <img :src="'/api/icon-by-spell/' + b.spell_id" :alt="b.name" @error="$el.parentElement.style.display='none'" loading="lazy"/>
                  </a>
                </template>
                <template x-if="!b.spell_id || b.spell_id <= 0">
                  <img class="spell-icon" :src="'/api/icon/' + b.icon + '.jpg'" :alt="b.name"
                    @error="$el.style.display='none'" loading="lazy"/>
                </template>
                <span class="buff-name" :title="b.name" x-text="b.name"></span>
                <span class="buff-pct" x-text="b.uptime+'%'"></span>
              </div>
              <div class="buff-bar-bg">
                <div class="buff-bar-fill" :class="{debuff: b.kind==='debuff'}" :style="{width: b.uptime+'%'}"></div>
              </div>
            </div>
          </template>
          <template x-if="result.buffs.filter(b => b.kind !== 'constant').length === 0">
            <div style="color:var(--muted);font-size:.8rem;padding:.3rem 0">&#8212;</div>
          </template>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- Action Timeline -->
<template x-if="result && result.timeline && result.timeline.length > 0">
  <div class="timeline-section">
    <div class="timeline-toggle" @click="timelineOpen=!timelineOpen">
      <span x-text="timelineOpen?'\u25bc':'\u25ba'"></span>
      <span>&#128220; <span x-text="$store.i18n.t('result.timeline_title')"></span></span>
      <span style="font-size:.75rem;margin-left:.3rem" x-text="'('+result.timeline.length+' '+$store.i18n.t('result.timeline_events_hint')+')'" ></span>
    </div>
    <template x-if="timelineOpen">
      <div class="timeline-table-wrap">
        <table class="timeline-table">
          <thead>
            <tr>
              <th style="width:3rem" x-text="$store.i18n.t('result.timeline_time')"></th>
              <th style="width:1.5rem"></th>
              <th x-text="$store.i18n.t('result.timeline_ability')"></th>
              <th style="width:4rem" x-text="$store.i18n.t('result.timeline_type')"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(ev,idx) in result.timeline" :key="idx">
              <tr class="timeline-row">
                <td style="color:var(--muted);font-variant-numeric:tabular-nums" x-text="ev.time.toFixed(2)+'s'"></td>
                <td>
                  <template x-if="ev.spell_id > 0">
                    <a class="spell-icon-wrap-sm" :href="'https://www.wowhead.com/spell=' + ev.spell_id" target="_blank" rel="noopener">
                      <img :src="'/api/icon-by-spell/' + ev.spell_id" :alt="ev.name" @error="$el.parentElement.style.display='none'" loading="lazy"/>
                    </a>
                  </template>
                </td>
                <td :class="'ev-'+ev.type" x-text="ev.name"></td>
                <td style="color:var(--muted);font-size:.78rem;text-transform:capitalize" x-text="ev.type"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>
  </div>
</template>

<!-- Footer: Raw JSON (showFooter=true, /result/) -->
<template x-if="options.showFooter">
  <div class="result-footer">
    <a :href="'/api/result/'+jobId+'/json'" target="_blank" style="color:var(--muted);font-size:.78rem" x-text="$store.i18n.t('result.raw_json')"></a>
  </div>
</template>

<!-- Mini footer (sim.html — showFooter=false): Share + Raw JSON -->
<template x-if="!options.showFooter">
  <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
    <button class="btn btn-accent2 btn-sm" @click="copyShareById()"
      x-text="copied ? '\u2713 '+$store.i18n.t('common.copied') : '&#128279; '+$store.i18n.t('common.share')"></button>
    <a :href="'/api/result/'+jobId+'/json'" target="_blank" style="color:var(--muted);font-size:var(--text-sm)" x-text="$store.i18n.t('result.raw_json')"></a>
  </div>
</template>
