<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimCraft — Panel Admina</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid #333;
      padding-bottom: 1rem;
    }
    header h1 { font-size: 1.4rem; color: #fff; }
    header span { font-size: 0.85rem; color: #888; }
    a.logout {
      color: #e55;
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 1rem;
    }
    section { max-width: 860px; margin: 0 auto; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #ccc; }
    .form-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-box input, .form-box textarea {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      margin-bottom: 0.8rem;
      resize: vertical;
    }
    .form-box textarea { min-height: 120px; }
    .form-box label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #aaa;
    }
    button.primary {
      background: #f4a01c;
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.4rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button.primary:hover { background: #e09010; }
    .news-list { display: flex; flex-direction: column; gap: 1rem; }
    .news-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .news-card .info { flex: 1; }
    .news-card .info h3 { font-size: 1rem; margin-bottom: 0.3rem; }
    .news-card .info p { font-size: 0.85rem; color: #888; white-space: pre-wrap; }
    .news-card .meta { font-size: 0.75rem; color: #555; margin-top: 0.4rem; }
    .news-card .actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    button.danger {
      background: transparent;
      color: #e55;
      border: 1px solid #e55;
      border-radius: 6px;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.danger:hover { background: #2a1010; }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-left: 0.5rem;
      font-weight: 600;
    }
    .badge.published { background: #1a3a1a; color: #4c4; }
    .badge.draft { background: #2a2a1a; color: #aa8; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
    .tab { background: none; border: none; color: #888; cursor: pointer; padding: 0.5rem 1rem; font-size: 0.95rem; border-radius: 6px 6px 0 0; }
    .tab.active { background: #1a1a1a; color: #fff; }
    .tab:hover { color: #ccc; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .log-entry { font-family: monospace; font-size: 0.85rem; padding: 0.4rem 0.6rem; border-bottom: 1px solid #222; }
    .log-entry:hover { background: #151515; }
    .log-entry .time { color: #666; margin-right: 0.5rem; }
    .log-entry .level { margin-right: 0.5rem; font-weight: 600; }
    .log-entry .level.INFO { color: #4c4; }
    .log-entry .level.WARNING { color: #cc4; }
    .log-entry .level.ERROR { color: #e55; }
    .log-entry .msg { color: #ccc; }
    .log-entry .ctx { color: #666; font-size: 0.8rem; }
    .empty { color: #555; text-align: center; padding: 2rem 0; }
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #222; border: 1px solid #444;
      color: #eee; padding: 0.7rem 1.2rem;
      border-radius: 8px; font-size: 0.9rem;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      max-width: 700px; width: 95%;
      max-height: 80vh; overflow-y: auto;
      padding: 1.5rem;
    }
    .modal h3 { margin-bottom: 1rem; }
    .modal-close {
      float: right; background: none; border: none;
      color: #888; font-size: 1.5rem; cursor: pointer;
    }
    .modal-close:hover { color: #fff; }
    .sim-item {
      padding: 0.6rem; border-bottom: 1px solid #222;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sim-item:hover { background: #151515; }
    .sim-link {
      color: #f4a01c; text-decoration: none; font-size: 0.85rem;
    }
    .sim-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ SimCraft Admin</h1>
    <div>
      <span id="username"></span>
      <a class="logout" href="/admin/logout">Wyloguj</a>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="news">Newsy</button>
    <button class="tab" data-tab="users">Użytkownicy</button>
    <button class="tab" data-tab="logs">Logi</button>
  </div>

  <div class="tab-content active" id="tab-news">
    <h2>Dodaj news</h2>
    <div class="form-box">
      <input type="text" id="news-title" placeholder="Tytuł newsa..." />
      <textarea id="news-body" placeholder="Treść..."></textarea>
      <label>
        <input type="checkbox" id="news-published" checked />
        Opublikowany
      </label>
      <button class="primary" onclick="createNews()">Dodaj news</button>
    </div>

    <h2>Newsy</h2>
    <div class="news-list" id="news-list">
      <p class="empty">Ładowanie...</p>
    </div>
  </div>

  <div class="tab-content" id="tab-users">
    <h2>Użytkownicy</h2>
    <p style="color:#666;font-size:0.85rem;margin-bottom:1rem;">Lista użytkowników na podstawie historii symulacji.</p>
    <div style="display:flex;gap:1rem;margin-bottom:1rem;align-items:center">
      <button class="primary" onclick="loadUsers()">Odśwież</button>
      <input type="text" id="user-search" placeholder="Szukaj..." 
             style="flex:1;background:#111;color:#ccc;padding:0.5rem;border:1px solid #333;border-radius:6px;"
             oninput="filterUsers()" />
    </div>
    <div class="news-list" id="user-list">
      <p class="empty">Ładowanie...</p>
    </div>
  </div>

  <div class="tab-content" id="tab-logs">
    <h2>Logi</h2>
    <div style="margin-bottom: 1rem;">
      <button class="primary" onclick="loadLogs()">Odśwież</button>
      <select id="log-level" onchange="loadLogs()" style="background:#111;color:#ccc;padding:0.4rem;border:1px solid #333;border-radius:4px;">
        <option value="">Wszystkie</option>
        <option value="INFO">INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR</option>
      </select>
    </div>
    <div class="log-list" id="log-list" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;max-height:500px;overflow-y:auto;">
      <p class="empty">Ładowanie...</p>
    </div>
  </div>

  <div id="toast"></div>

  <div id="user-modal" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" onclick="closeUserModal()">&times;</button>
      <h3>Symulacje użytkownika</h3>
      <div id="user-sim-list"></div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    function toast(msg, color = '#eee') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.color = color;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function fmt(ts) {
      return new Date(ts * 1000).toLocaleString('pl-PL');
    }

    async function loadNews() {
      const res = await fetch('/admin/api/news');
      if (res.status === 302 || res.redirected) {
        window.location = '/admin/login'; return;
      }
      const news = await res.json();
      const list = document.getElementById('news-list');
      if (!news.length) {
        list.innerHTML = '<p class="empty">Brak newsów.</p>';
        return;
      }
      list.innerHTML = news.map(n => `
        <div class="news-card" id="card-${n.id}">
          <div class="info">
            <h3>${escHtml(n.title)}
              <span class="badge ${n.published ? 'published' : 'draft'}">
                ${n.published ? 'opublikowany' : 'szkic'}
              </span>
            </h3>
            <p>${escHtml(n.body)}</p>
            <div class="meta">${fmt(n.created_at)}</div>
          </div>
          <div class="actions">
            <button class="danger" onclick="togglePublish(${n.id}, ${n.published})">
              ${n.published ? 'Ukryj' : 'Publikuj'}
            </button>
            <button class="danger" onclick="deleteNews(${n.id})">Usuń</button>
          </div>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function createNews() {
      const title = document.getElementById('news-title').value.trim();
      const body  = document.getElementById('news-body').value.trim();
      const published = document.getElementById('news-published').checked;
      if (!title || !body) { toast('Uzupełnij tytuł i treść!', '#e88'); return; }
      const res = await fetch('/admin/api/news', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, published }),
      });
      if (res.ok) {
        toast('News dodany!', '#4c4');
        document.getElementById('news-title').value = '';
        document.getElementById('news-body').value = '';
        loadNews();
      } else {
        toast('Błąd przy dodawaniu.', '#e55');
      }
    }

    async function deleteNews(id) {
      if (!confirm('Na pewno usunąć?')) return;
      const res = await fetch(`/admin/api/news/${id}`, { method: 'DELETE' });
      if (res.ok) { toast('Usunięto.', '#aaa'); loadNews(); }
      else toast('Błąd.', '#e55');
    }

    async function togglePublish(id, current) {
      const res = await fetch(`/admin/api/news/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ published: !current }),
      });
      if (res.ok) loadNews();
      else toast('Błąd.', '#e55');
    }

    async function loadLogs() {
      const level = document.getElementById('log-level').value;
      const url = '/admin/api/logs?limit=100' + (level ? '&level=' + level : '');
      const res = await fetch(url);
      if (res.status === 302 || res.redirected) {
        window.location = '/admin/login'; return;
      }
      const logs = await res.json();
      const list = document.getElementById('log-list');
      if (!logs.length) {
        list.innerHTML = '<p class="empty">Brak logów.</p>';
        return;
      }
      list.innerHTML = logs.map(l => `
        <div class="log-entry">
          <span class="time">${l.created_at ? l.created_at.replace('T', ' ').slice(0,19) : ''}</span>
          <span class="level ${l.level}">${l.level}</span>
          <span class="msg">${escHtml(l.message)}</span>
          ${l.context ? `<div class="ctx">${escHtml(l.context)}</div>` : ''}
        </div>
      `).join('');
    }

    let allUsers = [];

    async function loadUsers() {
      const res = await fetch('/admin/api/users?limit=50');
      if (res.status === 302 || res.redirected) {
        window.location = '/admin/login'; return;
      }
      allUsers = await res.json();
      renderUsers(allUsers);
    }

    function renderUsers(users) {
      const list = document.getElementById('user-list');
      if (!users.length) {
        list.innerHTML = '<p class="empty">Brak użytkowników.</p>';
        return;
      }
      list.innerHTML = users.map(u => `
        <div class="news-card" onclick="openUserModal('${escHtml(u.user_id)}')" style="cursor:pointer">
          <div class="info">
            <h3>${escHtml(u.user_id || 'Nieznany')}</h3>
            <p>${escHtml(u.character_name || '—')} ${u.character_class ? '<span style="color:#f4a01c">' + escHtml((u.character_spec ? u.character_spec + ' ' : '') + u.character_class) + '</span>' : ''}</p>
            <div class="meta">
              ${u.sim_count} symulacji · śr. DPS: ${u.avg_dps ? Number(u.avg_dps).toLocaleString() : '—'} · 
              ${u.last_sim ? 'ostatnia: ' + fmt(u.last_sim) : 'brak'}
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterUsers() {
      const query = document.getElementById('user-search').value.toLowerCase().trim();
      if (!query) {
        renderUsers(allUsers);
        return;
      }
      const filtered = allUsers.filter(u => 
        (u.user_id && u.user_id.toLowerCase().includes(query)) ||
        (u.character_name && u.character_name.toLowerCase().includes(query))
      );
      renderUsers(filtered);
    }

    async function openUserModal(userId) {
      const modal = document.getElementById('user-modal');
      const list = document.getElementById('user-sim-list');
      modal.classList.remove('hidden');
      list.innerHTML = '<p class="empty">Ładowanie...</p>';
      
      const res = await fetch('/admin/api/users/' + encodeURIComponent(userId) + '/simulations');
      if (!res.ok) { list.innerHTML = '<p class="empty">Błąd ładowania.</p>'; return; }
      const sims = await res.json();
      
      if (!sims.length) {
        list.innerHTML = '<p class="empty">Brak symulacji.</p>';
        return;
      }
      list.innerHTML = sims.map(s => `
        <div class="sim-item">
          <div>
            <div style="font-weight:600">${escHtml(s.character_name || '—')}</div>
            <div style="font-size:0.8rem;color:#888">
              ${s.character_class ? '<span style="color:#f4a01c">' + escHtml((s.character_spec ? s.character_spec + ' ' : '') + s.character_class) + '</span> · ' : ''}
              ${s.fight_style} · ${fmt(s.created_at)}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700;color:#f4a01c;font-size:1.1rem">${Number(s.dps).toLocaleString()} DPS</div>
            <a class="sim-link" href="/result/${s.job_id}" target="_blank">Zobacz wynik ↗</a>
          </div>
        </div>
      `).join('');
    }

    function closeUserModal() {
      document.getElementById('user-modal').classList.add('hidden');
    }

    document.getElementById('user-modal').addEventListener('click', function(e) {
      if (e.target === this) closeUserModal();
    });

    loadNews();
  </script>
</body>
</html>
