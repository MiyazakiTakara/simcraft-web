<div class="grid">
  <div class="panel">
    <h2 x-text="$store.i18n.t('chars.title')"></h2>

    <template x-if="loadingChars">
      <div style="display:flex;flex-direction:column;gap:.6rem;padding:.5rem 0">
        <template x-for="i in [1,2,3,4,5]" :key="i">
          <div style="display:flex;align-items:center;gap:.6rem">
            <div class="skeleton skeleton-avatar"></div>
            <div style="flex:1">
              <div class="skeleton skeleton-text" style="width:60%"></div>
              <div class="skeleton skeleton-text" style="width:40%"></div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <template x-if="errorChars"><p style="color:#f66;font-size:var(--text-sm)" x-text="errorChars"></p></template>
    <template x-if="!loadingChars && !errorChars && characters.length === 0">
      <div style="text-align:center;padding:1.5rem 1rem;color:var(--muted)">
        <div style="font-size:2rem;margin-bottom:.5rem">👤</div>
        <p style="font-size:var(--text-base);margin-bottom:.3rem" x-text="$store.i18n.t('chars.no_chars_account')"></p>
        <p style="font-size:var(--text-sm)" x-text="$store.i18n.t('chars.no_chars_hint')"></p>
      </div>
    </template>
    <template x-if="!loadingChars && characters.length">
      <div>
        <input class="search" :placeholder="$store.i18n.t('chars.filter_placeholder')" x-model="charFilter"/>
        <div class="char-list">
          <template x-for="ch in filteredChars" :key="ch.id">
            <div class="char-item" :class="{active: selectedChar && selectedChar.id === ch.id}" @click="selectChar(ch)">
              <img class="char-avatar" :src="ch.avatar || '/static/default_avatar.png'" :alt="ch.name"/>
              <div>
                <div class="char-name" x-text="ch.name"></div>
                <div class="char-meta">
                  <span x-text="ch.realm + ' \xb7 ' + $store.i18n.t('chars.level_short') + ch.level"></span>
                  <span x-show="ch.class" :style="{color: classColor(ch.class), fontWeight: '600'}" x-text="' \xb7 ' + (ch.spec ? ch.spec + ' ' : '') + ch.class"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <div>
    <div class="panel" style="margin-bottom:1rem">
      <h2 x-text="$store.i18n.t('sim.title')"></h2>
      <div class="sim-tabs">
        <button class="tab" :class="{active: simMode==='addon'}" @click="simMode='addon'" x-text="'\ud83d\udccb ' + $store.i18n.t('sim.mode_addon')"></button>
        <button class="tab" :class="{active: simMode==='armory'}" @click="simMode='armory'" x-text="'\ud83c\udf10 ' + $store.i18n.t('sim.mode_armory')"></button>
      </div>
      <template x-if="simMode==='addon'">
        <textarea class="addon-box" :placeholder="$store.i18n.t('sim.addon_placeholder')" x-model="addonText"></textarea>
      </template>
      <template x-if="simMode==='armory'">
        <div style="margin-bottom:.8rem">
          <template x-if="selectedChar">
            <p style="font-size:var(--text-base)">
              <span x-text="$store.i18n.t('sim.selected_char') + ': '"></span>
              <strong x-text="selectedChar.name + ' \u2013 ' + selectedChar.realm"></strong>
              <span x-show="selectedChar.class" :style="{color: classColor(selectedChar.class)}" x-text="' \xb7 ' + (selectedChar.spec ? selectedChar.spec + ' ' : '') + selectedChar.class"></span>
            </p>
          </template>
          <template x-if="!selectedChar && characters.length">
            <p style="font-size:var(--text-sm);color:var(--muted)" x-text="'\u2190 ' + $store.i18n.t('sim.select_char_hint')"></p>
          </template>
          <template x-if="!selectedChar && !characters.length">
            <p style="font-size:var(--text-sm);color:var(--muted)" x-text="$store.i18n.t('sim.no_chars_use_addon')"></p>
          </template>
        </div>
      </template>
      <div class="sim-options">
        <div class="sim-option">
          <label x-text="$store.i18n.t('sim.fight_style')"></label>
          <select x-model="simOptions.fight_style">
            <option value="Patchwerk">Patchwerk</option>
            <option value="HecticAddCleave">HecticAddCleave</option>
            <option value="LightMovement">LightMovement</option>
            <option value="HeavyMovement">HeavyMovement</option>
          </select>
        </div>
        <div class="sim-option">
          <label x-text="$store.i18n.t('sim.iterations')"></label>
          <input type="number" x-model.number="simOptions.iterations" min="100" max="10000" step="100"/>
        </div>
        <div class="sim-option">
          <label x-text="$store.i18n.t('sim.target_error')"></label>
          <input type="number" x-model.number="simOptions.target_error" min="0.1" max="5" step="0.1"/>
        </div>
      </div>
      <button class="btn btn-primary" @click="startSim()" :disabled="loadingSim">
        <span x-show="loadingSim" class="spinner"></span>
        <span x-show="!loadingSim" x-text="'\u25b6 ' + $store.i18n.t('sim.run_sim') + ' (\u2694\ufe0f DPS)'"></span>
      </button>
      <p x-show="job && job.status === 'running'" style="margin-top:.6rem;font-size:var(--text-sm);color:var(--muted)">
        <span x-text="$store.i18n.t('sim.running') + ' (job: '"></span><span x-text="job?.id?.slice(0,8)"></span><span>\u2026)</span>
      </p>
    </div>

    <template x-if="simResult">
      <div class="panel">
        <div class="result-hero">
          <div class="dps-value" x-text="'\u2694\ufe0f ' + formatDps(resultMetric(simResult).value)"></div>
          <div class="dps-label" style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:center">
            <span x-text="resultMetric(simResult).label + ' (\xb1' + formatDps(resultMetric(simResult).std) + ')'"></span>
            <template x-if="job.charName">
              <a :href="armoryUrl(job.realmSlug, job.charName)" target="_blank" rel="noopener"
                :style="{background: classColor(job.charClass), color: classTextColor(job.charClass), padding: '.2rem .7rem', borderRadius: '999px', fontWeight: '700', fontSize: '.85rem', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '.3rem'}">
                <span x-text="job.charName + (job.charSpec || job.charClass ? ' \xb7 ' + (job.charSpec ? job.charSpec + ' ' : '') + (job.charClass || '') : '')"></span>
                <span style="font-size:.75rem;opacity:.8">\u2197</span>
              </a>
            </template>
            <template x-if="!job.charName"><span x-text="simResult.name"></span></template>
          </div>
        </div>

        <!-- Stats + Spell breakdown -->
        <div class="result-grid">
          <div>
            <h2 style="margin-bottom:.6rem" x-text="$store.i18n.t('result.stats')"></h2>
            <div class="stat-list">
              <template x-for="[key, val] in Object.entries(simResult.stats)" :key="key">
                <div class="stat-row"><span class="stat-name" x-text="formatStatName(key)"></span><span class="stat-val" x-text="formatStatValue(key, val)"></span></div>
              </template>
            </div>
          </div>
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
              <h2 x-text="$store.i18n.t('result.spell_breakdown')"></h2>
              <div style="display:flex;gap:.3rem">
                <button class="tab" :class="{active: spellSort==='total_dmg'}" @click="spellSort='total_dmg'" x-text="$store.i18n.t('result.total_dmg')"></button>
                <button class="tab" :class="{active: spellSort==='dps'}" @click="spellSort='dps'" x-text="$store.i18n.t('result.dps')"></button>
              </div>
            </div>
            <div class="spell-list">
              <template x-for="sp in sortedSpells" :key="sp.name">
                <div class="spell-row" @mouseenter="hoveredSpell=sp.name" @mouseleave="hoveredSpell=null">
                  <div x-show="hoveredSpell===sp.name" class="spell-tooltip">
                    <div class="spell-tooltip-row"><span x-text="$store.i18n.t('result.spell_executes')"></span><span x-text="sp.count ?? '\u2014'"></span></div>
                    <div class="spell-tooltip-row"><span x-text="$store.i18n.t('result.spell_avg_hit')"></span><span x-text="formatDmg(sp.avg_hit)"></span></div>
                    <div class="spell-tooltip-row"><span x-text="$store.i18n.t('result.spell_crit')"></span><span x-text="(sp.crit_pct ?? '\u2014') + '%'"></span></div>
                    <div class="spell-tooltip-row"><span x-text="$store.i18n.t('result.spell_miss')"></span><span x-text="(sp.miss_pct ?? 0) + '%'"></span></div>
                  </div>
                  <div class="spell-head" style="display:flex;align-items:center;gap:.5rem">
                    <img
                      x-show="sp.icon && sp.icon !== 'inv_misc_questionmark'"
                      style="width:22px;height:22px;border-radius:4px;flex-shrink:0;object-fit:cover;border:1px solid var(--border);background:var(--surface);vertical-align:middle"
                      :src="'https://wow.zamimg.com/images/wow/icons/medium/'+sp.icon+'.jpg'"
                      :alt="sp.name"
                      @error="$el.style.display='none'"
                      loading="lazy"
                    />
                    <span x-text="sp.name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                    <span style="display:flex;gap:.6rem;align-items:center;flex-shrink:0">
                      <span x-show="spellSort==='total_dmg'"><strong x-text="formatDmg(sp.total_dmg)"></strong><span style="color:var(--muted);font-size:var(--text-xs)" x-text="' (' + sp.dmg_pct + '%)'" ></span></span>
                      <span x-show="spellSort==='dps'"><strong x-text="formatDps(sp.dps)"></strong> DPS<span style="color:var(--muted);font-size:var(--text-xs)" x-text="' (' + sp.dps_pct + '%)'" ></span></span>
                      <span style="color:var(--accent);font-size:var(--text-xs)" x-text="sp.crit_pct + '% crit'"></span>
                    </span>
                  </div>
                  <div class="spell-bar-bg"><div class="spell-bar-fill" :style="{width: pctBarWidth(sp[spellSort], sortedSpells, spellSort)}"></div></div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Buff Uptime -->
        <template x-if="simResult.buffs && simResult.buffs.length > 0">
          <div style="margin-top:1.2rem">
            <h2 style="margin-bottom:.2rem">⚡ Buff Uptime</h2>
            <p style="font-size:.78rem;color:var(--muted);margin-bottom:.6rem">Buffs and debuffs with partial uptime (0%–100%)</p>
            <div style="display:flex;flex-direction:column;gap:.45rem">
              <template x-for="b in simResult.buffs" :key="b.name">
                <div>
                  <div style="display:grid;grid-template-columns:22px 1fr auto;gap:.5rem;align-items:center;margin-bottom:.18rem">
                    <img
                      style="width:22px;height:22px;border-radius:4px;object-fit:cover;border:1px solid var(--border);background:var(--surface)"
                      :src="'https://wow.zamimg.com/images/wow/icons/medium/'+b.icon+'.jpg'"
                      :alt="b.name"
                      @error="$el.src='/static/icons/default.png';$el.onerror=null"
                      loading="lazy"
                    />
                    <span style="font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" :title="b.name" x-text="b.name"></span>
                    <span style="font-size:.78rem;color:var(--muted);white-space:nowrap" x-text="b.uptime+'%'"></span>
                  </div>
                  <div style="height:8px;border-radius:4px;background:var(--border);overflow:hidden">
                    <div
                      style="height:100%;border-radius:4px;transition:width .3s"
                      :style="{width:b.uptime+'%', background: b.kind==='debuff' ? '#e74c3c' : 'var(--accent)'}"
                    ></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Action Timeline — lokalny x-data, zero zależności od parent state -->
        <template x-if="simResult.timeline && simResult.timeline.length > 0">
          <div x-data="{open: false}" style="margin-top:1.2rem">
            <div
              style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.9rem;color:var(--muted);user-select:none;padding:.4rem 0"
              @click="open = !open"
            >
              <span x-text="open ? '\u25bc' : '\u25ba'"></span>
              <span>📜 Action Sequence Log</span>
              <span style="font-size:.75rem;margin-left:.3rem" x-text="'(' + simResult.timeline.length + ' events, sample iteration)'"></span>
            </div>
            <div x-show="open" x-cloak style="overflow-x:auto;margin-top:.5rem;max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
              <table style="width:100%;border-collapse:collapse;font-size:.82rem">
                <thead>
                  <tr>
                    <th style="background:var(--surface);color:var(--muted);font-weight:600;padding:.45rem .7rem;text-align:left;position:sticky;top:0;z-index:1;width:3rem">Time</th>
                    <th style="background:var(--surface);color:var(--muted);font-weight:600;padding:.45rem .7rem;text-align:left;position:sticky;top:0;z-index:1;width:1.5rem"></th>
                    <th style="background:var(--surface);color:var(--muted);font-weight:600;padding:.45rem .7rem;text-align:left;position:sticky;top:0;z-index:1">Ability</th>
                    <th style="background:var(--surface);color:var(--muted);font-weight:600;padding:.45rem .7rem;text-align:left;position:sticky;top:0;z-index:1;width:4rem">Type</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(ev, idx) in simResult.timeline" :key="idx">
                    <tr>
                      <td style="color:var(--muted);font-variant-numeric:tabular-nums;padding:.38rem .7rem;border-top:1px solid var(--border)" x-text="ev.time.toFixed(2) + 's'"></td>
                      <td style="padding:.38rem .7rem;border-top:1px solid var(--border)">
                        <img
                          style="width:18px;height:18px;border-radius:3px;object-fit:cover;vertical-align:middle;border:1px solid var(--border);background:var(--surface)"
                          :src="'https://wow.zamimg.com/images/wow/icons/small/' + ev.icon + '.jpg'"
                          :alt="ev.name"
                          @error="$el.style.visibility='hidden'"
                          loading="lazy"
                        />
                      </td>
                      <td
                        style="padding:.38rem .7rem;border-top:1px solid var(--border)"
                        :style="{color: ev.type==='proc'?'var(--accent)':ev.type==='buff'?'#7fc97f':ev.type==='debuff'?'#e74c3c':'var(--text)'}"
                        x-text="ev.name"
                      ></td>
                      <td style="color:var(--muted);font-size:.78rem;text-transform:capitalize;padding:.38rem .7rem;border-top:1px solid var(--border)" x-text="ev.type"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>

        <!-- Pie chart -->
        <div class="chart-section"><h2>🥧 DPS Pie Chart</h2><img class="dps-chart-img" :src="'/api/result/' + job.id + '/dps-chart.png?t=' + Date.now()" alt="DPS Chart" @click="chartModal = $el.src" loading="lazy"/></div>
        <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
          <a :href="'/api/result/' + job.id + '/json'" target="_blank" style="color:var(--muted);font-size:var(--text-sm)" x-text="$store.i18n.t('result.raw_json')"></a>
          <span style="color:var(--border)">\xb7</span>
          <button class="btn btn-accent2 btn-sm"
            @click="copyToClipboard(getShareUrl(job.id), job.id)"
            x-text="copiedJobId === job.id ? $store.i18n.t('common.copied') : '\ud83d\udd17 ' + $store.i18n.t('common.share')"
          ></button>
        </div>
      </div>
    </template>
  </div>

  <!-- Historia boczna -->
  <div class="panel" style="max-height:800px;display:flex;flex-direction:column">
    <h2 x-text="$store.i18n.t('history.title')"></h2>

    <template x-if="loadingHistory">
      <div style="display:flex;flex-direction:column;gap:.6rem;padding:.5rem 0">
        <template x-for="i in [1,2,3,4,5]" :key="i">
          <div style="display:flex;flex-direction:column;gap:.4rem;padding:.5rem 0;border-bottom:1px solid var(--border)">
            <div class="skeleton skeleton-text" style="width:55%"></div>
            <div class="skeleton skeleton-text" style="width:35%"></div>
            <div class="skeleton skeleton-text" style="width:45%"></div>
          </div>
        </template>
      </div>
    </template>

    <div x-show="!loadingHistory && history.length === 0" class="char-card-empty" style="text-align:center;padding:1rem" x-text="$store.i18n.t('history.empty')"></div>
    <div x-show="!loadingHistory && history.length > 0" class="history-list" style="flex:1">
      <template x-for="entry in pagedHistory" :key="entry.job_id">
        <div class="history-item" style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
          <div style="flex:1;min-width:0" @click="loadHistoryResult(entry.job_id)">
            <div class="history-char">
              <span x-text="entry.character_name || 'Addon Export'"></span>
              <span x-show="entry.character_class" :style="{color: classColor(entry.character_class), fontWeight:'600', fontSize:'.8rem', marginLeft:'.3rem'}" x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + entry.character_class"></span>
              <span class="role-badge" x-text="roleIcon(entry.role || 'dps')"></span>
            </div>
            <div class="history-dps" x-text="formatDps(entry.dps)"></div>
            <div class="history-time" x-text="formatTime(entry.created_at)"></div>
            <div class="history-style" x-text="entry.fight_style"></div>
          </div>
          <button class="btn btn-accent2 btn-sm btn-icon"
            @click.stop="copyToClipboard(getShareUrl(entry.job_id), entry.job_id)"
            x-text="copiedJobId === entry.job_id ? '\u2713' : '\ud83d\udd17'"
            :title="$store.i18n.t('common.copy')"
          ></button>
        </div>
      </template>
    </div>
    <div class="pagination" x-show="historyPageCount > 1">
      <button @click="historyPage > 1 && historyPage--" :disabled="historyPage === 1">&laquo;</button>
      <template x-for="p in historyPages()" :key="p">
        <button :class="{active: historyPage === p}" @click="historyPage = p" x-text="p"></button>
      </template>
      <button @click="historyPage < historyPageCount && historyPage++" :disabled="historyPage === historyPageCount">&raquo;</button>
    </div>
  </div>
</div>
