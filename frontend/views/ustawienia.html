<div class="settings-view" x-init="initSettings()">

  <div x-show="loading" style="text-align:center;padding:4rem;color:var(--muted)">
    <span x-text="$store.i18n.t('common.loading')"></span>
  </div>

  <div x-show="!loading && error" class="settings-error-banner">
    <span x-text="error"></span>
  </div>

  <div x-show="!loading && !isLoggedIn" style="max-width:600px;margin:4rem auto;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:1rem">🔒</div>
    <h2 x-text="$store.i18n.t('settings.login_required')"></h2>
    <p class="settings-hint" style="margin-top:.5rem" x-text="$store.i18n.t('settings.login_required_hint')"></p>
    <a href="/auth/login" class="btn btn-primary btn-lg" style="margin-top:1.5rem" x-text="$store.i18n.t('header.login')"></a>
  </div>

  <div x-show="!loading && isLoggedIn" style="max-width:680px;margin:2rem auto">
    <h2 style="margin-bottom:1.5rem" x-text="$store.i18n.t('settings.title')"></h2>

    <!-- Sekcja: Postać -->
    <section class="settings-section">
      <h3 x-text="$store.i18n.t('settings.section_char')"></h3>
      <p class="settings-hint" x-text="$store.i18n.t('settings.section_char_hint')"></p>
      <div class="settings-row">
        <label x-text="$store.i18n.t('settings.char_name')"></label>
        <div style="flex:1">
          <select x-model="form_main_character_name" @change="onCharSelect()" class="settings-input">
            <option value="" x-text="$store.i18n.t('settings.select_char')"></option>
            <template x-for="ch in characters" :key="ch.id">
              <option :value="ch.name" x-text="ch.name + ' - ' + ch.realm + ' (' + ch.level + ')'"></option>
            </template>
          </select>
        </div>
      </div>
    </section>

    <!-- Sekcja: Publiczny profil -->
    <section class="settings-section" x-show="bnetId && !form_profile_private">
      <h3>🌐 Publiczny profil</h3>
      <p class="settings-hint">Udostępnij swój profil znajomym — pokazuje historię symulacji i DPS trend.</p>
      <div style="display:flex;align-items:center;gap:.6rem;margin-top:.25rem">
        <code
          style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.45rem .75rem;font-size:.82rem;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          x-text="'https://sim.miyazakitakara.ovh/u/' + bnetId"
        ></code>
        <button
          class="btn btn-ghost btn-sm"
          @click="copyProfileUrl()"
          x-text="profileUrlCopied ? '✔ Skopiowano' : '📋 Kopiuj'"
          :style="profileUrlCopied ? 'color:var(--accent)' : ''"
        ></button>
        <a
          :href="'/u/' + bnetId"
          target="_blank"
          class="btn btn-accent2 btn-sm"
        >↗ Otwórz</a>
      </div>
    </section>

    <!-- Sekcja: Prywatność -->
    <section class="settings-section">
      <h3 x-text="$store.i18n.t('settings.section_privacy')"></h3>
      <div class="settings-toggle-row">
        <div>
          <div class="settings-toggle-label" x-text="$store.i18n.t('settings.private_profile')"></div>
          <div class="settings-hint" x-text="$store.i18n.t('settings.private_profile_hint')"></div>
        </div>
        <button
          class="toggle-btn"
          :class="{ active: form_profile_private }"
          @click="form_profile_private = !form_profile_private"
          :aria-pressed="form_profile_private"
          :title="form_profile_private ? $store.i18n.t('settings.private_on') : $store.i18n.t('settings.private_off')"
        >
          <span class="toggle-knob"></span>
        </button>
      </div>
      <div x-show="form_profile_private" class="settings-private-banner">
        <span>🔒</span>
        <span x-text="$store.i18n.t('settings.private_active_info')"></span>
      </div>
    </section>

    <!-- Sekcja: Prywatność postaci -->
    <section class="settings-section" :style="form_profile_private ? 'opacity:0.5;pointer-events:none' : ''">
      <h3 x-text="$store.i18n.t('settings.char_privacy')"></h3>
      <p class="settings-hint" x-text="$store.i18n.t('settings.char_privacy_hint')"></p>
      <template x-if="form_profile_private">
        <p class="settings-hint" style="margin-bottom:.5rem" x-text="$store.i18n.t('settings.char_privacy_disabled')"></p>
      </template>
      <template x-if="characters.length === 0">
        <p class="settings-hint" x-text="$store.i18n.t('settings.no_chars_for_privacy')"></p>
      </template>
      <template x-if="characters.length > 0">
        <div style="display:flex;flex-direction:column;gap:.4rem;max-height:300px;overflow-y:auto">
          <template x-for="ch in characters" :key="ch.id">
            <div class="char-privacy-row">
              <div class="char-privacy-row-info">
                <span class="char-name-text" x-text="ch.name"></span>
                <span class="char-realm-text" x-text="'- ' + ch.realm"></span>
              </div>
              <button
                class="btn btn-sm"
                :class="charPrivacies[ch.name + '|' + (ch.realm_slug || ch.realm)] ? 'btn-danger' : 'btn-accent2'"
                @click="toggleCharPrivacy(ch, $event)"
                x-text="charPrivacies[ch.name + '|' + (ch.realm_slug || ch.realm)] ? $store.i18n.t('settings.char_private') : $store.i18n.t('settings.char_public')"
              ></button>
            </div>
          </template>
        </div>
      </template>
    </section>

    <!-- Sekcja: Interfejs -->
    <section class="settings-section">
      <h3 x-text="$store.i18n.t('settings.section_ui')"></h3>
      <div class="settings-row" style="align-items:center">
        <label x-text="$store.i18n.t('settings.language')"></label>
        <div style="display:flex;gap:.4rem">
          <button class="seg-btn" :class="{ active: $store.i18n.lang === 'pl' }" @click="$store.i18n.setLang('pl')" x-text="$store.i18n.t('lang.pl')"></button>
          <button class="seg-btn" :class="{ active: $store.i18n.lang === 'en' }" @click="$store.i18n.setLang('en')" x-text="$store.i18n.t('lang.en')"></button>
        </div>
      </div>
      <div class="settings-row" style="align-items:center">
        <label x-text="$store.i18n.t('settings.theme')"></label>
        <div style="display:flex;gap:.4rem">
          <button class="seg-btn" :class="{ active: $store.theme === 'dark' }" @click="setTheme('dark')" x-text="$store.i18n.t('settings.theme_dark')"></button>
          <button class="seg-btn" :class="{ active: $store.theme === 'light' }" @click="setTheme('light')" x-text="$store.i18n.t('settings.theme_light')"></button>
        </div>
      </div>
    </section>

    <!-- Zapis -->
    <div style="display:flex;align-items:center;gap:1rem;margin-top:2rem">
      <button
        class="btn btn-primary btn-lg"
        :disabled="saving"
        @click="save()"
        x-text="saving ? $store.i18n.t('settings.saving') : $store.i18n.t('settings.save')"
      ></button>
      <span x-show="saveMsg" x-text="saveMsg" :class="saveMsgOk ? 'settings-ok' : 'settings-err'"></span>
    </div>
  </div>
</div>
