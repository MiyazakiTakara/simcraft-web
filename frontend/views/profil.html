<div style="max-width:1200px;margin:0 auto;padding:1rem">
  <div class="sim-tabs" style="margin-bottom:1rem">
    <button class="tab" :class="{active: profileTab==='chars'}" @click="profileTab='chars'" x-text="$store.i18n.t('profile.tab_chars')"></button>
    <button class="tab" :class="{active: profileTab==='history'}" @click="profileTab='history'; loadHistory()" x-text="$store.i18n.t('profile.tab_history')"></button>
    <button class="tab" :class="{active: profileTab==='trend'}" @click="profileTab='trend'; initTrendTab()">📈 DPS Trend</button>
  </div>

  <!-- TAB: POSTACIE -->
  <template x-if="profileTab==='chars'">
    <div>
      <h2 style="margin-bottom:1rem" x-text="'👤 ' + $store.i18n.t('chars.title')"></h2>

      <template x-if="charsLoading">
        <div class="char-grid">
          <template x-for="i in [1,2,3,4,5,6]" :key="i">
            <div class="char-card skeleton-card">
              <div class="char-card-header">
                <div class="skeleton skeleton-avatar-lg"></div>
                <div style="flex:1;display:flex;flex-direction:column;gap:.4rem">
                  <div class="skeleton skeleton-title" style="width:60%"></div>
                  <div class="skeleton skeleton-text" style="width:80%"></div>
                  <div class="skeleton skeleton-text" style="width:50%"></div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <template x-if="!charsLoading">
        <div>
          <div class="char-grid">
            <template x-for="char in characters" :key="char.id">
              <div class="char-card" @click="openCharDetails(char)">
                <div class="char-card-header">
                  <img class="char-card-avatar" :src="char.avatar || '/static/default_avatar.png'" :alt="char.name"/>
                  <div class="char-card-info">
                    <div class="char-card-name" x-text="char.name"></div>
                    <div class="char-card-meta" x-text="char.realm + ' · ' + $store.i18n.t('chars.level_short') + char.level"></div>
                    <div class="char-card-meta" :style="{color: classColor(char.class)}" x-text="(char.spec ? char.spec + ' ' : '') + (char.class || '')"></div>
                  </div>
                </div>
                <template x-if="getCharDps(char.name)">
                  <div>
                    <div class="char-card-dps" x-text="'⚔️ ' + formatDps(getCharDps(char.name).latest)"></div>
                    <div class="char-card-dps-small" x-text="getCharDps(char.name).trend"></div>
                    <div class="char-card-meta" style="margin-top:.4rem"
                      x-text="getCharDps(char.name).count + ' ' + $store.i18n.t('profile.simulations_count') + ' · ' + formatTime(getCharDps(char.name).lastSim)"
                    ></div>
                    <button
                      class="btn btn-accent2 btn-sm"
                      style="margin-top:.5rem"
                      @click.stop="selectTrendChar(char); profileTab='trend'; initTrendTab()"
                    >📈 Trend</button>
                  </div>
                </template>
                <template x-if="!getCharDps(char.name)">
                  <div class="char-card-empty" x-text="$store.i18n.t('history.empty')"></div>
                </template>
              </div>
            </template>
          </div>
          <template x-if="characters.length === 0">
            <div style="text-align:center;padding:3rem;color:var(--muted)">
              <p x-text="$store.i18n.t('chars.no_chars')"></p>
              <p class="char-card-meta" style="margin-top:.3rem" x-text="$store.i18n.t('chars.no_chars_auto')"></p>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <!-- TAB: HISTORIA -->
  <template x-if="profileTab==='history'">
    <div>
      <h2 style="margin-bottom:1rem" x-text="'📜 ' + $store.i18n.t('history.title')"></h2>

      <template x-if="historyLoading">
        <div class="history-list">
          <template x-for="i in [1,2,3,4,5]" :key="i">
            <div class="history-item" style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
              <div style="flex:1;display:flex;flex-direction:column;gap:.4rem">
                <div class="skeleton skeleton-title" style="width:45%"></div>
                <div class="skeleton skeleton-text" style="width:30%"></div>
                <div class="skeleton skeleton-text" style="width:55%"></div>
              </div>
              <div class="skeleton" style="width:2rem;height:2rem;border-radius:4px;flex-shrink:0"></div>
            </div>
          </template>
        </div>
      </template>

      <template x-if="!historyLoading">
        <div>
          <div x-show="history.length === 0" class="char-card-empty" style="text-align:center;padding:2rem" x-text="$store.i18n.t('history.empty')"></div>
          <div x-show="history.length > 0" class="history-list" style="max-height:500px;overflow-y:auto">
            <template x-for="entry in pagedHistory" :key="entry.job_id">
              <div class="history-item" style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem"
                   @click="openResultPage(entry.job_id)">
                <div style="flex:1;min-width:0">
                  <div class="history-char">
                    <span x-text="entry.character_name || 'Addon Export'"></span>
                    <span x-show="entry.character_class" :style="{color: classColor(entry.character_class), fontWeight:'600', fontSize:'.8rem', marginLeft:'.3rem'}" x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + entry.character_class"></span>
                    <span class="role-badge" x-text="roleIcon(entry.role || 'dps')"></span>
                  </div>
                  <div class="history-dps" x-text="formatDps(entry.dps)"></div>
                  <div class="history-time" x-text="formatTime(entry.created_at)"></div>
                  <div class="history-style" x-text="entry.fight_style"></div>
                </div>
                <button class="btn btn-accent2 btn-sm btn-icon"
                  @click.stop="copyToClipboard(getShareUrl(entry.job_id), entry.job_id)"
                  x-text="copiedJobId === entry.job_id ? '✓' : '🔗'"
                  :title="$store.i18n.t('common.copy')"
                ></button>
              </div>
            </template>
          </div>
          <div class="pagination" x-show="historyPageCount > 1" style="margin-top:1rem">
            <button @click="historyPage > 1 && historyPage--">&laquo;</button>
            <template x-for="p in historyPages()" :key="p">
              <button :class="{active: historyPage === p}" x-text="p" @click="historyPage = p"></button>
            </template>
            <button @click="historyPage < historyPageCount && historyPage++">&raquo;</button>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- TAB: DPS TREND -->
  <template x-if="profileTab==='trend'">
    <div>
      <h2 style="margin-bottom:1rem">📈 DPS Trend</h2>

      <div style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;margin-bottom:1rem">
        <div class="form-field">
          <label x-text="$store.i18n.t('chars.title')"></label>
          <select class="select" style="min-width:200px"
            x-model="trendCharName"
            @change="loadTrend()"
          >
            <option value="" disabled x-text="$store.i18n.t('settings.select_char')"></option>
            <template x-for="char in characters" :key="char.name">
              <option :value="char.name + '|' + char.realm_slug" x-text="char.name + ' (' + char.realm + ')'"></option>
            </template>
          </select>
        </div>
        <div class="form-field">
          <label x-text="$store.i18n.t('sim.fight_style')"></label>
          <select class="select" style="min-width:160px"
            x-model="trendFightStyle"
            @change="loadTrend()"
          >
            <option>Patchwerk</option>
            <option>HecticAddCleave</option>
            <option>LightMovement</option>
            <option>HeavyMovement</option>
            <option>CastingPatchwerk</option>
          </select>
        </div>
        <button class="btn btn-ghost btn-md" @click="loadTrend()">🔄 Odśwież</button>
      </div>

      <div x-show="trendLoading" style="text-align:center;padding:3rem;color:var(--muted)">
        <span class="spinner" style="width:1.5rem;height:1.5rem"></span>
      </div>
      <div x-show="!trendLoading && trendPoints.length === 0 && trendCharName" class="char-card-empty" style="text-align:center;padding:3rem">
        Brak danych dla tej postaci i fight style. Uruchom kilka symulacji, żeby zobaczyć trend.
      </div>
      <div x-show="!trendLoading && !trendCharName" class="char-card-empty" style="text-align:center;padding:3rem">
        Wybierz postać powyżej.
      </div>

      <div x-show="!trendLoading && trendPoints.length > 0" style="position:relative;width:100%;max-width:860px">
        <canvas id="trendChartCanvas" height="320"></canvas>
      </div>

      <template x-if="!trendLoading && trendPoints.length > 0">
        <div style="margin-top:1.2rem;overflow-x:auto">
          <table class="trend-table">
            <thead>
              <tr>
                <th>#</th>
                <th x-text="$store.i18n.t('history.fight_style').replace('Styl walki','Data').replace('Fight style','Date')">Data</th>
                <th>DPS</th>
                <th x-text="$store.i18n.t('common.unknown').replace('Nieznany','Zmiana').replace('Unknown','Change')">Zmiana</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(pt, i) in trendPoints" :key="pt.job_id">
                <tr @click="openResultPage(pt.job_id)">
                  <td class="trend-neutral" x-text="i + 1"></td>
                  <td x-text="formatTime(pt.timestamp)"></td>
                  <td style="font-weight:600" x-text="formatDps(pt.dps)"></td>
                  <td>
                    <span x-show="i > 0"
                      :class="pt.dps >= trendPoints[i-1].dps ? 'trend-up' : 'trend-down'"
                      x-text="(pt.dps >= trendPoints[i-1].dps ? '▲ +' : '▼ ') + formatDps(Math.abs(pt.dps - trendPoints[i-1].dps))"
                    ></span>
                    <span x-show="i === 0" class="trend-neutral">—</span>
                  </td>
                  <td>
                    <a :href="'/result/' + pt.job_id" target="_blank" class="btn btn-accent2 btn-sm" @click.stop>↗</a>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>
    </div>
  </template>
</div>
