<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rankings — SimCraft Web</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <script>
    (function() {
      var theme = localStorage.getItem('simcraft_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
    })();
  </script>
  <link rel="stylesheet" href="/style.css?v=10"/>
  <script src="/i18n.js?v=1"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/utils.js?v=2"></script>
  <script src="/api.js?v=3"></script>
  <script src="/header.js?v=1"></script>
  <script src="/partials.js?v=1"></script>
</head>
<body>
<div x-data="rankings()" x-init="init()" class="container">

  <div id="site-header"></div>

  <div style="max-width:900px;margin:0 auto;padding:1.5rem 1rem">

    <div style="margin-bottom:1.5rem">
      <h1 style="font-size:1.6rem;margin:0 0 .3rem" x-text="$store.i18n.t('rankings.title')"></h1>
      <p style="color:var(--muted);font-size:.9rem;margin:0" x-text="$store.i18n.t('rankings.subtitle')"></p>
    </div>

    <!-- Filtry -->
    <div class="panel" style="padding:1rem;margin-bottom:1.5rem;display:flex;flex-wrap:wrap;gap:.8rem;align-items:flex-end">
      <div class="sim-option" style="min-width:160px">
        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem" x-text="$store.i18n.t('rankings.filter_fight_style')"></label>
        <select x-model="filters.fight_style" @change="load()">
          <template x-for="fs in meta.fight_styles" :key="fs">
            <option :value="fs" x-text="fs"></option>
          </template>
        </select>
      </div>
      <div class="sim-option" style="min-width:160px">
        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem" x-text="$store.i18n.t('rankings.filter_class')"></label>
        <select x-model="filters.character_class" @change="filters.character_spec=''; load()">
          <option value="" x-text="$store.i18n.t('rankings.all_classes')"></option>
          <template x-for="cls in meta.classes" :key="cls">
            <option :value="cls" x-text="cls"></option>
          </template>
        </select>
      </div>
      <div class="sim-option" style="min-width:160px" x-show="filters.character_class && specOptions.length > 0">
        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem" x-text="$store.i18n.t('rankings.filter_spec')"></label>
        <select x-model="filters.character_spec" @change="load()">
          <option value="" x-text="$store.i18n.t('rankings.all_specs')"></option>
          <template x-for="sp in specOptions" :key="sp">
            <option :value="sp" x-text="sp"></option>
          </template>
        </select>
      </div>
    </div>

    <!-- Podium top 3 -->
    <template x-if="!loading && rankings.length >= 3">
      <div class="rankings-podium">
        <a :href="'/result/' + rankings[1].job_id" class="podium-card podium-silver">
          <div class="podium-medal">🥈</div>
          <div class="podium-rank">#2</div>
          <div class="podium-name" :style="{color: classColor(rankings[1].character_class)}" x-text="rankings[1].character_name"></div>
          <div class="podium-spec" x-text="(rankings[1].character_spec ? rankings[1].character_spec + ' ' : '') + rankings[1].character_class"></div>
          <div class="podium-dps" x-text="formatDps(rankings[1].dps)"></div>
          <div class="podium-realm" x-text="rankings[1].character_realm"></div>
          <template x-if="rankings[1].one_button_mode">
            <div style="margin-top:.3rem"><span style="background:rgba(255,160,0,.15);color:#ffa000;font-size:.68rem;padding:.08rem .35rem;border-radius:3px;font-weight:600" x-text="$store.i18n.t('rankings.badge_one_button')"></span></div>
          </template>
        </a>
        <a :href="'/result/' + rankings[0].job_id" class="podium-card podium-gold">
          <div class="podium-crown">👑</div>
          <div class="podium-medal">🥇</div>
          <div class="podium-rank">#1</div>
          <div class="podium-name" :style="{color: classColor(rankings[0].character_class)}" x-text="rankings[0].character_name"></div>
          <div class="podium-spec" x-text="(rankings[0].character_spec ? rankings[0].character_spec + ' ' : '') + rankings[0].character_class"></div>
          <div class="podium-dps" x-text="formatDps(rankings[0].dps)"></div>
          <div class="podium-realm" x-text="rankings[0].character_realm"></div>
          <template x-if="rankings[0].one_button_mode">
            <div style="margin-top:.3rem"><span style="background:rgba(255,160,0,.15);color:#ffa000;font-size:.68rem;padding:.08rem .35rem;border-radius:3px;font-weight:600" x-text="$store.i18n.t('rankings.badge_one_button')"></span></div>
          </template>
        </a>
        <a :href="'/result/' + rankings[2].job_id" class="podium-card podium-bronze">
          <div class="podium-medal">🥉</div>
          <div class="podium-rank">#3</div>
          <div class="podium-name" :style="{color: classColor(rankings[2].character_class)}" x-text="rankings[2].character_name"></div>
          <div class="podium-spec" x-text="(rankings[2].character_spec ? rankings[2].character_spec + ' ' : '') + rankings[2].character_class"></div>
          <div class="podium-dps" x-text="formatDps(rankings[2].dps)"></div>
          <div class="podium-realm" x-text="rankings[2].character_realm"></div>
          <template x-if="rankings[2].one_button_mode">
            <div style="margin-top:.3rem"><span style="background:rgba(255,160,0,.15);color:#ffa000;font-size:.68rem;padding:.08rem .35rem;border-radius:3px;font-weight:600" x-text="$store.i18n.t('rankings.badge_one_button')"></span></div>
          </template>
        </a>
      </div>
    </template>

    <!-- Tabela 4-10 -->
    <template x-if="!loading && rankings.length > 3">
      <div class="panel" style="padding:0;overflow:hidden">
        <table class="rankings-table">
          <thead>
            <tr>
              <th x-text="$store.i18n.t('rankings.col_rank')"></th>
              <th x-text="$store.i18n.t('rankings.col_character')"></th>
              <th x-text="$store.i18n.t('rankings.col_spec')"></th>
              <th x-text="$store.i18n.t('rankings.col_dps')"></th>
              <th x-text="$store.i18n.t('rankings.col_date')"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="entry in rankings.slice(3)" :key="entry.job_id">
              <tr @click="window.location.href = '/result/' + entry.job_id" style="cursor:pointer">
                <td style="color:var(--muted);font-weight:600" x-text="entry.rank"></td>
                <td>
                  <span :style="{color: classColor(entry.character_class), fontWeight: '600'}" x-text="entry.character_name"></span>
                  <span style="color:var(--muted);font-size:.8rem" x-text="entry.character_realm ? ' · ' + entry.character_realm : ''"></span>
                  <template x-if="entry.one_button_mode">
                    <span style="margin-left:.4rem;background:rgba(255,160,0,.15);color:#ffa000;font-size:.68rem;padding:.08rem .35rem;border-radius:3px;font-weight:600" x-text="$store.i18n.t('rankings.badge_one_button')"></span>
                  </template>
                </td>
                <td style="color:var(--muted);font-size:.88rem" x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + entry.character_class"></td>
                <td style="font-weight:700;color:var(--accent)" x-text="formatDps(entry.dps)"></td>
                <td style="color:var(--muted);font-size:.8rem" x-text="formatTime(entry.created_at)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </template>

    <!-- Stany ładowania / pustki -->
    <template x-if="loading">
      <div style="text-align:center;padding:3rem;color:var(--muted)" x-text="$store.i18n.t('rankings.loading')"></div>
    </template>
    <template x-if="!loading && rankings.length === 0">
      <div style="text-align:center;padding:3rem;color:var(--muted)">
        <div style="font-size:2rem;margin-bottom:.5rem">🏙️</div>
        <div x-text="$store.i18n.t('rankings.empty')"></div>
      </div>
    </template>
    <template x-if="!loading && rankings.length > 0 && rankings.length < 3">
      <div class="panel">
        <template x-for="entry in rankings" :key="entry.job_id">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border);cursor:pointer" @click="window.location.href='/result/'+entry.job_id">
            <div style="display:flex;align-items:center;gap:.8rem">
              <span style="font-size:1.4rem" x-text="entry.rank===1?'🥇':entry.rank===2?'🥈':'🥉'"></span>
              <div>
                <span :style="{color: classColor(entry.character_class), fontWeight:'600'}" x-text="entry.character_name"></span>
                <span style="color:var(--muted);font-size:.8rem" x-text="' · ' + (entry.character_spec||'') + ' ' + entry.character_class"></span>
                <template x-if="entry.one_button_mode">
                  <span style="margin-left:.4rem;background:rgba(255,160,0,.15);color:#ffa000;font-size:.68rem;padding:.08rem .35rem;border-radius:3px;font-weight:600" x-text="$store.i18n.t('rankings.badge_one_button')"></span>
                </template>
              </div>
            </div>
            <span style="font-weight:700;color:var(--accent)" x-text="formatDps(entry.dps)"></span>
          </div>
        </template>
      </div>
    </template>

  </div>

  <div id="site-footer"></div>

</div>

<script>
function rankings() {
  return {
    rankings: [],
    meta: { classes: [], classes_specs: {}, fight_styles: ['Patchwerk','HecticAddCleave','LightMovement','HeavyMovement'] },
    filters: { fight_style: 'Patchwerk', character_class: '', character_spec: '' },
    loading: true,

    get specOptions() {
      if (!this.filters.character_class) return [];
      return this.meta.classes_specs[this.filters.character_class] || [];
    },

    async init() {
      await this.loadMeta();
      await this.load();
    },

    async loadMeta() {
      try {
        const r = await fetch('/api/rankings/meta');
        if (r.ok) this.meta = await r.json();
      } catch(e) {}
    },

    async load() {
      this.loading = true;
      try {
        const p = new URLSearchParams({
          fight_style: this.filters.fight_style,
          limit: 10,
          ...(this.filters.character_class ? { character_class: this.filters.character_class } : {}),
          ...(this.filters.character_spec  ? { character_spec:  this.filters.character_spec  } : {}),
        });
        const r = await fetch('/api/rankings?' + p);
        if (r.ok) {
          const data = await r.json();
          this.rankings = data.rankings;
        }
      } catch(e) {}
      this.loading = false;
    },

    classColor(c) { return Utils.classColor(c); },
    formatDps(v)  { return Utils.formatDps(v); },
    formatTime(v) { return Utils.formatTime(v); },
  };
}
</script>
</body>
</html>
