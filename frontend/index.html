<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimCraft Web — Symulator DPS dla WoW</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <meta name="description" content="Darmowy symulator DPS dla World of Warcraft. Zaloguj się przez Battle.net i sprawdz DPS swojej postaci."/>
  <meta property="og:title"       content="SimCraft Web — Symulator DPS dla WoW"/>
  <meta property="og:description" content="Darmowy symulator DPS dla World of Warcraft oparty na SimulationCraft."/>
  <meta property="og:type"        content="website"/>
  <meta property="og:url"         content="https://sim.miyazakitakara.ovh"/>
  <meta property="og:image"       content="https://sim.miyazakitakara.ovh/static/og-image.png"/>
  <meta name="twitter:card"       content="summary_large_image"/>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var session = params.get('session');
      if (session) {
        localStorage.setItem('simcraft_session', session);
        history.replaceState({}, '', '/');
      }
    })();
  </script>

  <link rel="stylesheet" href="/style.css?v=4"/>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/api.js?v=2"></script>
  <script src="/app.js?v=10"></script>
</head>
<body>
<div x-data="app()" x-init="init()" class="container">

  <!-- Header -->
  <header class="header">
    <div class="header-logo">⚔️ SimCraft Web</div>
    <template x-if="sessionId">
      <div class="header-user">
        <span class="header-badge" x-text="characters.length + ' postaci'"></span>
        <button class="btn btn-ghost" @click="logout()">Wyloguj</button>
      </div>
    </template>
    <template x-if="!sessionId">
      <a href="/auth/login" class="btn btn-login" style="font-size:.88rem;padding:.45rem 1.1rem">🔑 Zaloguj</a>
    </template>
  </header>

  <!-- ========================
       LANDING PAGE (niezalogowany)
       ======================== -->
  <template x-if="!sessionId">
    <div class="landing">

      <!-- Hero -->
      <div class="landing-hero">
        <h1 class="landing-hero-title">⚔️ Symulator DPS<br/>dla <span>World of Warcraft</span></h1>
        <p class="landing-hero-sub">Sprawdź i porównaj DPS swojej postaci oparty na SimulationCraft — bezpłatnie, w przeglądarce.</p>
        <div class="landing-hero-btns">
          <a href="/auth/login" class="btn btn-login">🔑 Zaloguj przez Battle.net</a>
          <button class="btn btn-ghost" @click="document.getElementById('addon-section').scrollIntoView({behavior:'smooth'})">Spróbuj bez logowania ↓</button>
        </div>
      </div>

      <!-- Features -->
      <div class="landing-features">
        <div class="feature-card">
          <div class="feature-icon">🌐</div>
          <div class="feature-title">Import z Armory</div>
          <div class="feature-desc">Zaloguj się przez Battle.net i symuluj dowolny swój charakter bezpośrednio z serwerów Blizzard.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📋</div>
          <div class="feature-title">Addon Export</div>
          <div class="feature-desc">Wklej output z addona SimulationCraft (/simc) i uruchom symulację bez logowania.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔗</div>
          <div class="feature-title">Udostępnianie</div>
          <div class="feature-desc">Każda symulacja ma unikalny link — podziel się wynikiem ze znajomymi lub gildiią.</div>
        </div>
      </div>

      <!-- Addon Export bez logowania -->
      <div id="addon-section" class="panel" style="max-width:760px;margin:0 auto;width:100%">
        <h2 style="font-size:1rem;color:var(--text);text-transform:none;letter-spacing:0;margin-bottom:.3rem">📋 Symuluj bez logowania — Addon Export</h2>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:.9rem">Wpisz <code style="background:var(--bg);padding:.1rem .35rem;border-radius:4px;font-size:.8rem">/simc</code> w grze, skopiuj tekst z addona i wklej poniżej.</p>

        <!-- formularz -->
        <template x-if="!pubResult || pubResult._source !== 'addon'">
          <div>
            <textarea
              class="addon-box"
              placeholder="Wklej tutaj output z addona SimulationCraft..."
              x-model="guestAddonText"
              style="min-height:140px"
            ></textarea>

            <div class="sim-options" style="margin-bottom:1rem">
              <div class="sim-option">
                <label>Styl walki</label>
                <select x-model="guestSimOptions.fight_style">
                  <option value="Patchwerk">Patchwerk</option>
                  <option value="HecticAddCleave">HecticAddCleave</option>
                  <option value="LightMovement">LightMovement</option>
                  <option value="HeavyMovement">HeavyMovement</option>
                </select>
              </div>
              <div class="sim-option">
                <label>Iteracje</label>
                <input type="number" x-model.number="guestSimOptions.iterations" min="100" max="10000" step="100"/>
              </div>
              <div class="sim-option">
                <label>Target Error %</label>
                <input type="number" x-model.number="guestSimOptions.target_error" min="0.1" max="5" step="0.1"/>
              </div>
            </div>

            <button class="btn btn-primary" @click="startGuestSim()" :disabled="guestLoadingSim">
              <span x-show="guestLoadingSim" class="spinner"></span>
              <span x-show="!guestLoadingSim">▶ Uruchom symulację</span>
            </button>
            <p x-show="guestLoadingSim" style="margin-top:.6rem;font-size:.85rem;color:var(--muted)">⏳ Symulacja w toku…</p>
            <p x-show="guestSimError" style="margin-top:.5rem;font-size:.85rem;color:#f66" x-text="guestSimError"></p>
          </div>
        </template>

        <!-- wynik addon -->
        <template x-if="pubResult && pubResult._source === 'addon'">
          <div>
            <button class="pub-result-back" @click="pubResult = null; pubJob = null">← Nowa symulacja</button>
            <div class="result-hero" style="padding:.8rem 0">
              <div class="dps-value" x-text="formatDps(pubResult.dps)"></div>
              <div class="dps-label">DPS (±<span x-text="formatDps(pubResult.dps_std)"></span>) · <span x-text="pubResult.name"></span></div>
            </div>
            <div class="result-grid">
              <div>
                <h2 style="margin-bottom:.6rem">Statystyki</h2>
                <div class="stat-list">
                  <template x-for="[key, val] in Object.entries(pubResult.stats)" :key="key">
                    <div class="stat-row">
                      <span class="stat-name" x-text="formatStatName(key)"></span>
                      <span class="stat-val"  x-text="formatStatValue(key, val)"></span>
                    </div>
                  </template>
                </div>
              </div>
              <div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
                  <h2>Breakdown spelli</h2>
                  <div style="display:flex;gap:.3rem">
                    <button class="tab" :class="{active: spellSort==='total_dmg'}" @click="spellSort='total_dmg'" style="font-size:.75rem;padding:.25rem .6rem">Total Dmg</button>
                    <button class="tab" :class="{active: spellSort==='dps'}"       @click="spellSort='dps'"       style="font-size:.75rem;padding:.25rem .6rem">DPS</button>
                  </div>
                </div>
                <template x-if="pubSortedSpells.length">
                  <div class="spell-list">
                    <template x-for="sp in pubSortedSpells" :key="sp.name">
                      <div class="spell-row">
                        <div class="spell-head">
                          <span x-text="sp.name"></span>
                          <span style="display:flex;gap:.6rem;align-items:center">
                            <span x-show="spellSort==='total_dmg'">
                              <strong x-text="formatDmg(sp.total_dmg)"></strong>
                              <span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dmg_pct + '%)'" ></span>
                            </span>
                            <span x-show="spellSort==='dps'">
                              <strong x-text="formatDps(sp.dps)"></strong> DPS
                              <span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dps_pct + '%)'" ></span>
                            </span>
                            <span style="color:var(--accent);font-size:.8rem" x-text="sp.crit_pct + '% crit'"></span>
                          </span>
                        </div>
                        <div class="spell-bar-bg">
                          <div class="spell-bar-fill" :style="{width: pctBarWidth(sp[spellSort], pubSortedSpells, spellSort)}"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
            <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted);align-items:center">
              <a :href="'/api/result/' + pubJob.id + '/json'" target="_blank" style="color:var(--muted)">Raw JSON</a>
              <span style="color:var(--border)">·</span>
              <button class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;margin:0" @click="copyToClipboard(getShareUrl(pubJob.id), pubJob.id)" x-text="copiedJobId === pubJob.id ? '✓ Skopiowano' : '🔗 Udostępnij'"></button>
              <a href="/auth/login" class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent);color:#000;border:none;border-radius:4px;text-decoration:none">🔑 Zaloguj się aby używać Armory</a>
            </div>
          </div>
        </template>
      </div>

      <!-- Publiczna historia -->
      <div class="landing-history-section">
        <div class="landing-history-header">
          <h2>📈 Ostatnie symulacje</h2>
          <span x-text="history.length + ' wyników'"></span>
        </div>

        <template x-if="!pubResult || pubResult._source === 'addon'">
          <div>
            <template x-if="history.length === 0">
              <p style="color:var(--muted);font-size:.88rem">Brak publicznych symulacji.</p>
            </template>
            <div class="landing-history-grid">
              <template x-for="entry in history.slice(0,24)" :key="entry.job_id">
                <div class="pub-history-card" @click="loadPubResult(entry.job_id)">
                  <div class="pub-card-name" x-text="entry.character_name || 'Addon Export'"></div>
                  <div class="pub-card-class"
                    x-show="entry.character_class"
                    :style="{color: classColor(entry.character_class)}"
                    x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + (entry.character_class || '')"
                  ></div>
                  <div class="pub-card-dps" x-text="formatDps(entry.dps)"></div>
                  <div class="pub-card-meta" x-text="entry.fight_style + ' · ' + formatTime(entry.created_at)"></div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Widok pojedynczego wyniku z historii -->
        <template x-if="pubResult && pubResult._source !== 'addon'">
          <div>
            <button class="pub-result-back" @click="pubResult = null; pubJob = null">← Powrót do listy</button>
            <div class="panel">
              <div class="result-hero">
                <div class="dps-value" x-text="formatDps(pubResult.dps)"></div>
                <div class="dps-label" style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:center">
                  <span>DPS (±<span x-text="formatDps(pubResult.dps_std)"></span>)</span>
                  <template x-if="pubJob && pubJob.charName">
                    <a
                      :href="armoryUrl(pubJob.realmSlug, pubJob.charName)"
                      target="_blank"
                      rel="noopener"
                      :style="{
                        background: classColor(pubJob.charClass),
                        color: classTextColor(pubJob.charClass),
                        padding: '.2rem .7rem',
                        borderRadius: '999px',
                        fontWeight: '700',
                        fontSize: '.85rem',
                        textDecoration: 'none',
                        display: 'inline-flex',
                        alignItems: 'center',
                        gap: '.3rem',
                      }"
                    >
                      <span x-text="pubJob.charName + (pubJob.charSpec || pubJob.charClass ? ' · ' + (pubJob.charSpec ? pubJob.charSpec + ' ' : '') + (pubJob.charClass || '') : '')"></span>
                      <span style="font-size:.75rem;opacity:.8">↗</span>
                    </a>
                  </template>
                  <template x-if="!pubJob || !pubJob.charName">
                    <span x-text="pubResult.name"></span>
                  </template>
                </div>
              </div>
              <div class="result-grid">
                <div>
                  <h2 style="margin-bottom:.6rem">Statystyki</h2>
                  <div class="stat-list">
                    <template x-for="[key, val] in Object.entries(pubResult.stats)" :key="key">
                      <div class="stat-row">
                        <span class="stat-name" x-text="formatStatName(key)"></span>
                        <span class="stat-val"  x-text="formatStatValue(key, val)"></span>
                      </div>
                    </template>
                  </div>
                </div>
                <div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
                    <h2>Breakdown spelli</h2>
                    <div style="display:flex;gap:.3rem">
                      <button class="tab" :class="{active: spellSort==='total_dmg'}" @click="spellSort='total_dmg'" style="font-size:.75rem;padding:.25rem .6rem">Total Dmg</button>
                      <button class="tab" :class="{active: spellSort==='dps'}"       @click="spellSort='dps'"       style="font-size:.75rem;padding:.25rem .6rem">DPS</button>
                    </div>
                  </div>
                  <template x-if="pubSortedSpells.length">
                    <div class="spell-list">
                      <template x-for="sp in pubSortedSpells" :key="sp.name">
                        <div class="spell-row">
                          <div class="spell-head">
                            <span x-text="sp.name"></span>
                            <span style="display:flex;gap:.6rem;align-items:center">
                              <span x-show="spellSort==='total_dmg'">
                                <strong x-text="formatDmg(sp.total_dmg)"></strong>
                                <span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dmg_pct + '%)'" ></span>
                              </span>
                              <span x-show="spellSort==='dps'">
                                <strong x-text="formatDps(sp.dps)"></strong> DPS
                                <span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dps_pct + '%)'" ></span>
                              </span>
                              <span style="color:var(--accent);font-size:.8rem" x-text="sp.crit_pct + '% crit'"></span>
                            </span>
                          </div>
                          <div class="spell-bar-bg">
                            <div class="spell-bar-fill" :style="{width: pctBarWidth(sp[spellSort], pubSortedSpells, spellSort)}"></div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template x-if="!pubSortedSpells.length">
                    <p style="color:var(--muted);font-size:.85rem">Brak danych o spellach.</p>
                  </template>
                </div>
              </div>
              <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted);align-items:center">
                <a :href="'/api/result/' + pubJob.id + '/json'" target="_blank" style="color:var(--muted)">Raw JSON</a>
                <span style="color:var(--border)">·</span>
                <button class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;margin:0" @click="copyToClipboard(getShareUrl(pubJob.id), pubJob.id)" x-text="copiedJobId === pubJob.id ? '✓ Skopiowano' : '🔗 Udostępnij'"></button>
                <a href="/auth/login" class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent);color:#000;border:none;border-radius:4px;cursor:pointer;margin:0;text-decoration:none">🔑 Zaloguj się aby symulować</a>
              </div>
            </div>
          </div>
        </template>
      </div>

    </div>
  </template>

  <!-- ========================
       APP (zalogowany)
       ======================== -->
  <template x-if="sessionId">
    <div class="grid">

      <div class="panel">
        <h2>Postacie</h2>
        <template x-if="loadingChars">
          <div style="text-align:center;padding:2rem"><span class="spinner"></span></div>
        </template>
        <template x-if="errorChars">
          <p style="color:#f66;font-size:.85rem" x-text="errorChars"></p>
        </template>
        <template x-if="!loadingChars && !errorChars && characters.length === 0">
          <div style="text-align:center;padding:1.5rem 1rem;color:var(--muted)">
            <div style="font-size:2rem;margin-bottom:.5rem">👤</div>
            <p style="font-size:.9rem;margin-bottom:.3rem">Brak postaci WoW na tym koncie.</p>
            <p style="font-size:.8rem">Postacie muszą mieć co najmniej level 10, lub skorzystaj z trybu <strong>Addon Export</strong>.</p>
          </div>
        </template>
        <template x-if="!loadingChars && characters.length">
          <div>
            <input class="search" placeholder="Szukaj postaci..." x-model="charFilter"/>
            <div class="char-list">
              <template x-for="ch in filteredChars" :key="ch.id">
                <div class="char-item" :class="{active: selectedChar && selectedChar.id === ch.id}" @click="selectChar(ch)">
                  <img class="char-avatar" :src="ch.avatar || '/static/default_avatar.png'" :alt="ch.name"/>
                  <div>
                    <div class="char-name" x-text="ch.name"></div>
                    <div class="char-meta">
                      <span x-text="ch.realm + ' · lv' + ch.level"></span>
                      <span x-show="ch.class" :style="{color: classColor(ch.class), fontWeight: '600'}" x-text="' · ' + (ch.spec ? ch.spec + ' ' : '') + ch.class"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <div>
        <div class="panel" style="margin-bottom:1rem">
          <h2>Symulacja</h2>
          <div class="sim-tabs">
            <button class="tab" :class="{active: simMode==='addon'}" @click="simMode='addon'">📋 Addon Export</button>
            <button class="tab" :class="{active: simMode==='armory'}" @click="simMode='armory'">🌐 Armory</button>
          </div>
          <template x-if="simMode==='addon'">
            <textarea class="addon-box" placeholder="Wklej tutaj output z addona SimulationCraft (/simc w grze)..." x-model="addonText"></textarea>
          </template>
          <template x-if="simMode==='armory'">
            <div style="margin-bottom:.8rem">
              <template x-if="selectedChar">
                <p style="font-size:.9rem">Wybrana postać: <strong x-text="selectedChar.name + ' – ' + selectedChar.realm"></strong>
                  <span x-show="selectedChar.class" :style="{color: classColor(selectedChar.class)}" x-text="' · ' + (selectedChar.spec ? selectedChar.spec + ' ' : '') + selectedChar.class"></span>
                </p>
              </template>
              <template x-if="!selectedChar && characters.length">
                <p style="font-size:.88rem;color:var(--muted)">← Wybierz postać z listy po lewej</p>
              </template>
              <template x-if="!selectedChar && !characters.length">
                <p style="font-size:.88rem;color:var(--muted)">Brak postaci — skorzystaj z trybu <strong>Addon Export</strong>.</p>
              </template>
            </div>
          </template>
          <div class="sim-options">
            <div class="sim-option">
              <label>Styl walki</label>
              <select x-model="simOptions.fight_style">
                <option value="Patchwerk">Patchwerk</option>
                <option value="HecticAddCleave">HecticAddCleave</option>
                <option value="LightMovement">LightMovement</option>
                <option value="HeavyMovement">HeavyMovement</option>
              </select>
            </div>
            <div class="sim-option">
              <label>Iteracje</label>
              <input type="number" x-model.number="simOptions.iterations" min="100" max="10000" step="100"/>
            </div>
            <div class="sim-option">
              <label>Target Error %</label>
              <input type="number" x-model.number="simOptions.target_error" min="0.1" max="5" step="0.1"/>
            </div>
          </div>
          <button class="btn btn-primary" @click="startSim()" :disabled="loadingSim">
            <span x-show="loadingSim" class="spinner"></span>
            <span x-show="!loadingSim">▶ Uruchom symulację</span>
          </button>
          <p x-show="job && job.status === 'running'" style="margin-top:.6rem;font-size:.85rem;color:var(--muted)">⏳ Symulacja w toku… (job: <span x-text="job?.id?.slice(0,8)"></span>…)</p>
        </div>

        <template x-if="simResult">
          <div class="panel">
            <div class="result-hero">
              <div class="dps-value" x-text="formatDps(simResult.dps)"></div>
              <div class="dps-label" style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:center">
                <span>DPS (±<span x-text="formatDps(simResult.dps_std)"></span>)</span>
                <template x-if="job.charName">
                  <a :href="armoryUrl(job.realmSlug, job.charName)" target="_blank" rel="noopener"
                    :style="{background: classColor(job.charClass), color: classTextColor(job.charClass), padding: '.2rem .7rem', borderRadius: '999px', fontWeight: '700', fontSize: '.85rem', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '.3rem'}">
                    <span x-text="job.charName + (job.charSpec || job.charClass ? ' · ' + (job.charSpec ? job.charSpec + ' ' : '') + (job.charClass || '') : '')"></span>
                    <span style="font-size:.75rem;opacity:.8">↗</span>
                  </a>
                </template>
                <template x-if="!job.charName"><span x-text="simResult.name"></span></template>
              </div>
            </div>
            <div class="result-grid">
              <div>
                <h2 style="margin-bottom:.6rem">Statystyki</h2>
                <div class="stat-list">
                  <template x-for="[key, val] in Object.entries(simResult.stats)" :key="key">
                    <div class="stat-row">
                      <span class="stat-name" x-text="formatStatName(key)"></span>
                      <span class="stat-val"  x-text="formatStatValue(key, val)"></span>
                    </div>
                  </template>
                </div>
              </div>
              <div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
                  <h2>Breakdown spelli</h2>
                  <div style="display:flex;gap:.3rem">
                    <button class="tab" :class="{active: spellSort==='total_dmg'}" @click="spellSort='total_dmg'" style="font-size:.75rem;padding:.25rem .6rem">Total Dmg</button>
                    <button class="tab" :class="{active: spellSort==='dps'}"       @click="spellSort='dps'"       style="font-size:.75rem;padding:.25rem .6rem">DPS</button>
                  </div>
                </div>
                <template x-if="sortedSpells.length">
                  <div class="spell-list">
                    <template x-for="sp in sortedSpells" :key="sp.name">
                      <div class="spell-row">
                        <div class="spell-head">
                          <span x-text="sp.name"></span>
                          <span style="display:flex;gap:.6rem;align-items:center">
                            <span x-show="spellSort==='total_dmg'"><strong x-text="formatDmg(sp.total_dmg)"></strong><span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dmg_pct + '%)'" ></span></span>
                            <span x-show="spellSort==='dps'"><strong x-text="formatDps(sp.dps)"></strong> DPS<span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dps_pct + '%)'" ></span></span>
                            <span style="color:var(--accent);font-size:.8rem" x-text="sp.crit_pct + '% crit'"></span>
                          </span>
                        </div>
                        <div class="spell-bar-bg"><div class="spell-bar-fill" :style="{width: pctBarWidth(sp[spellSort], sortedSpells, spellSort)}"></div></div>
                      </div>
                    </template>
                  </div>
                </template>
                <template x-if="!sortedSpells.length"><p style="color:var(--muted);font-size:.85rem">Brak danych o spellach (użyj trybu addon dla pełnych danych)</p></template>
              </div>
            </div>
            <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted);align-items:center">
              <a :href="'/api/result/' + job.id + '/json'" target="_blank" style="color:var(--muted)">Raw JSON</a>
              <span style="color:var(--border)">·</span>
              <button class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;margin:0" @click="copyToClipboard(getShareUrl(job.id), job.id)" x-text="copiedJobId === job.id ? '✓ Skopiowano' : '🔗 Udostępnij'"></button>
            </div>
          </div>
        </template>
      </div>

      <div class="panel" style="max-height:800px;display:flex;flex-direction:column">
        <h2>Historia Publiczna</h2>
        <div x-show="history.length === 0" style="color:var(--muted);text-align:center;padding:1rem;font-size:.85rem">Brak symulacji</div>
        <div x-show="history.length > 0" class="history-list">
          <template x-for="entry in history.slice(0,50)" :key="entry.job_id">
            <div class="history-item" :class="{active: selectedHistory === entry.job_id}" style="cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
              <div style="flex:1;min-width:0" @click="loadHistoryResult(entry.job_id)">
                <div class="history-char">
                  <span x-text="entry.character_name || 'Addon Export'"></span>
                  <span x-show="entry.character_class" :style="{color: classColor(entry.character_class), fontWeight:'600', fontSize:'.8rem', marginLeft:'.3rem'}" x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + entry.character_class"></span>
                </div>
                <div class="history-dps" x-text="formatDps(entry.dps)"></div>
                <div class="history-time" x-text="formatTime(entry.created_at)"></div>
                <div class="history-style" x-text="entry.fight_style"></div>
              </div>
              <button class="btn" style="font-size:.7rem;padding:.25rem .5rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;flex-shrink:0" @click.stop="copyToClipboard(getShareUrl(entry.job_id), entry.job_id)" x-text="copiedJobId === entry.job_id ? '✓' : '🔗'" title="Skopiuj link"></button>
            </div>
          </template>
        </div>
      </div>

    </div>
  </template>

</div>
</body>
</html>
