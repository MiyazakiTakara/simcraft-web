<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimCraft Web — Symulator DPS dla WoW</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <meta name="description" content="Darmowy symulator DPS dla World of Warcraft. Zaloguj się przez Battle.net i sprawdz DPS swojej postaci."/>
  <meta property="og:title"       content="SimCraft Web — Symulator DPS dla WoW"/>
  <meta property="og:description" content="Darmowy symulator DPS dla World of Warcraft oparty na SimulationCraft."/>
  <meta property="og:type"        content="website"/>
  <meta property="og:url"         content="https://sim.miyazakitakara.ovh"/>
  <meta property="og:image"       content="https://sim.miyazakitakara.ovh/static/og-image.png"/>
  <meta name="twitter:card"       content="summary_large_image"/>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var session = params.get('session');
      if (session) {
        localStorage.setItem('simcraft_session', session);
        history.replaceState({}, '', '/');
      }
      var theme = localStorage.getItem('simcraft_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
    })();
  </script>

  <link rel="stylesheet" href="/style.css?v=6"/>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="/api.js?v=3"></script>
  <script src="/app.js?v=19"></script>

  <style>
    .chart-section { margin-top: 1.2rem; text-align: center; }
    .chart-section h2 { margin-bottom: .6rem; text-align: left; }
    .dps-chart-img { width: 100%; max-width: 800px; border-radius: 10px; border: 1px solid var(--border); cursor: zoom-in; }
    .chart-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: zoom-out; }
    .chart-modal-overlay img { max-width: 95vw; max-height: 90vh; border-radius: 10px; box-shadow: 0 8px 40px rgba(0,0,0,.7); }
    .pub-history-card { cursor: pointer; }
    .pub-history-card:hover { border-color: var(--accent); }
    .app-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: .5rem; }
    .app-tab { padding: .5rem 1.2rem; border-radius: 6px; font-size: .95rem; background: transparent; color: var(--muted); border: none; cursor: pointer; transition: all .2s; }
    .app-tab:hover { background: var(--bg); color: var(--text); }
    .app-tab.active { background: var(--accent); color: #fff; }
    .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .char-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; cursor: pointer; transition: border-color .2s; }
    .char-card:hover { border-color: var(--accent); }
    .char-card-header { display: flex; align-items: center; gap: .8rem; margin-bottom: .8rem; }
    .char-card-avatar { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; }
    .char-card-info { flex: 1; }
    .char-card-name { font-weight: 600; font-size: 1.05rem; }
    .char-card-meta { font-size: .82rem; color: var(--muted); }
    .char-card-dps { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .char-card-dps-small { font-size: .85rem; color: var(--muted); }
  </style>
</head>
<body>
<div x-data="app()" x-init="init()" class="container">

  <!-- Modal powiększenia chartu -->
  <div class="chart-modal-overlay" x-show="chartModal" x-cloak @click="chartModal=false" style="display:none">
    <img :src="chartModal" alt="DPS Chart"/>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-logo" style="cursor:pointer" @click="currentView = 'home'">⚔️ SimCraft Web</div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="theme-toggle" @click="toggleTheme()" :title="theme === 'dark' ? 'Przełącz na jasny' : 'Przełącz na ciemny'">
        <span x-text="theme === 'dark' ? '☀️' : '🌙'"></span>
      </button>
      <template x-if="sessionId">
        <div class="header-user">
          <button class="btn btn-ghost" style="font-size:.85rem;padding:.4rem .8rem" @click="currentView = 'symulacje'; activeTab = 'symulacje'">⚔️ Symulacje</button>
          <button class="btn btn-ghost" style="font-size:.85rem;padding:.4rem .8rem" @click="currentView = 'profil'; activeTab = 'profil'">👤 Profil</button>
          <span class="header-badge" x-text="characters.length + ' postaci'"></span>
          <button class="btn btn-ghost" @click="logout()">Wyloguj</button>
        </div>
      </template>
      <template x-if="!sessionId">
        <a href="/auth/login" class="btn btn-login" style="font-size:.88rem;padding:.45rem 1.1rem">🔑 Zaloguj</a>
      </template>
    </div>
  </header>

  <!-- HOME VIEW (default for both logged in and out) -->
  <template x-if="currentView === 'home'">
    <div class="landing">

      <div class="landing-hero">
        <h1 class="landing-hero-title">⚔️ Symulator DPS<br/>dla <span>World of Warcraft</span></h1>
        <p class="landing-hero-sub">Sprawdź i porównaj DPS swojej postaci oparty na SimulationCraft — bezpłatnie, w przeglądarce.</p>
        <div class="landing-hero-btns">
          <template x-if="!sessionId">
            <a href="/auth/login" class="btn btn-login">🔑 Zaloguj przez Battle.net</a>
          </template>
          <template x-if="sessionId">
            <button class="btn btn-ghost" @click="document.getElementById('addon-section').scrollIntoView({behavior:'smooth'})">Szybka symulacja z addona ↓</button>
          </template>
          <template x-if="!sessionId">
            <button class="btn btn-ghost" @click="document.getElementById('addon-section').scrollIntoView({behavior:'smooth'})">Spróbuj bez logowania ↓</button>
          </template>
        </div>
      </div>

      <!-- Addon Export -->
      <div id="addon-section" class="panel" style="max-width:760px;margin:0 auto;width:100%">
        <h2 style="font-size:1rem;color:var(--text);text-transform:none;letter-spacing:0;margin-bottom:.3rem">📋 Symuluj bez logowania — Addon Export</h2>
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:.9rem">Wpisz <code style="background:var(--bg);padding:.1rem .35rem;border-radius:4px;font-size:.8rem">/simc</code> w grze, skopiuj tekst z addona i wklej poniżej.</p>

        <template x-if="!pubResult || pubResult._source !== 'addon'">
          <div>
            <textarea class="addon-box" placeholder="Wklej tutaj output z addona SimulationCraft..." x-model="guestAddonText" style="min-height:140px"></textarea>
            <div class="sim-options" style="margin-bottom:1rem">
              <div class="sim-option"><label>Styl walki</label><select x-model="guestSimOptions.fight_style"><option value="Patchwerk">Patchwerk</option><option value="HecticAddCleave">HecticAddCleave</option><option value="LightMovement">LightMovement</option><option value="HeavyMovement">HeavyMovement</option></select></div>
              <div class="sim-option"><label>Iteracje</label><input type="number" x-model.number="guestSimOptions.iterations" min="100" max="10000" step="100"/></div>
              <div class="sim-option"><label>Target Error %</label><input type="number" x-model.number="guestSimOptions.target_error" min="0.1" max="5" step="0.1"/></div>
            </div>
            <button class="btn btn-primary" @click="startGuestSim()" :disabled="guestLoadingSim">
              <span x-show="guestLoadingSim" class="spinner"></span>
              <span x-show="!guestLoadingSim">▶ Uruchom symulację</span>
            </button>
            <p x-show="guestLoadingSim" style="margin-top:.6rem;font-size:.85rem;color:var(--muted)">⏳ Symulacja w toku…</p>
            <p x-show="guestSimError" style="margin-top:.5rem;font-size:.85rem;color:#f66" x-text="guestSimError"></p>
          </div>
        </template>

        <template x-if="pubResult && pubResult._source === 'addon'">
          <div>
            <button class="pub-result-back" @click="pubResult = null; pubJob = null">← Nowa symulacja</button>
            <div class="result-hero" style="padding:.8rem 0">
              <div class="dps-value" x-text="formatDps(pubResult.dps)"></div>
              <div class="dps-label">DPS (±<span x-text="formatDps(pubResult.dps_std)"></span>) · <span x-text="pubResult.name"></span></div>
            </div>
            <div class="result-grid">
              <div>
                <h2 style="margin-bottom:.6rem">Statystyki</h2>
                <div class="stat-list">
                  <template x-for="[key, val] in Object.entries(pubResult.stats)" :key="key">
                    <div class="stat-row"><span class="stat-name" x-text="formatStatName(key)"></span><span class="stat-val" x-text="formatStatValue(key, val)"></span></div>
                  </template>
                </div>
              </div>
              <div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
                  <h2>Breakdown spelli</h2>
                  <div style="display:flex;gap:.3rem">
                    <button class="tab" :class="{active: spellSort==='total_dmg'}" @click="spellSort='total_dmg'" style="font-size:.75rem;padding:.25rem .6rem">Total Dmg</button>
                    <button class="tab" :class="{active: spellSort==='dps'}" @click="spellSort='dps'" style="font-size:.75rem;padding:.25rem .6rem">DPS</button>
                  </div>
                </div>
                <div class="spell-list">
                  <template x-for="sp in pubSortedSpells" :key="sp.name">
                    <div class="spell-row" @mouseenter="hoveredSpell=sp.name" @mouseleave="hoveredSpell=null">
                      <div x-show="hoveredSpell===sp.name" class="spell-tooltip">
                        <div class="spell-tooltip-row"><span>Hits</span><span x-text="sp.count ?? '—'"></span></div>
                        <div class="spell-tooltip-row"><span>Avg hit</span><span x-text="formatDmg(sp.avg_hit)"></span></div>
                        <div class="spell-tooltip-row"><span>Crit</span><span x-text="(sp.crit_pct ?? '—') + '%'"></span></div>
                        <div class="spell-tooltip-row"><span>Miss / Dodge</span><span x-text="(sp.miss_pct ?? 0) + '%'"></span></div>
                      </div>
                      <div class="spell-head">
                        <span x-text="sp.name"></span>
                        <span style="display:flex;gap:.6rem;align-items:center">
                          <span x-show="spellSort==='total_dmg'"><strong x-text="formatDmg(sp.total_dmg)"></strong><span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dmg_pct + '%)'" ></span></span>
                          <span x-show="spellSort==='dps'"><strong x-text="formatDps(sp.dps)"></strong> DPS<span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dps_pct + '%)'" ></span></span>
                          <span style="color:var(--accent);font-size:.8rem" x-text="sp.crit_pct + '% crit'"></span>
                        </span>
                      </div>
                      <div class="spell-bar-bg"><div class="spell-bar-fill" :style="{width: pctBarWidth(sp[spellSort], pubSortedSpells, spellSort)}"></div></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
            <div class="chart-section">
              <h2>🥧 DPS Pie Chart</h2>
              <img class="dps-chart-img" :src="'/api/result/' + pubJob.id + '/dps-chart.png?t=' + Date.now()" alt="DPS Chart" @click="chartModal = $el.src" loading="lazy"/>
            </div>
            <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted);align-items:center">
              <a :href="'/api/result/' + pubJob.id + '/json'" target="_blank" style="color:var(--muted)">Raw JSON</a>
              <span style="color:var(--border)">·</span>
              <button class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;margin:0" @click="copyToClipboard(getShareUrl(pubJob.id), pubJob.id)" x-text="copiedJobId === pubJob.id ? '✓ Skopiowano' : '🔗 Udostępnij'"></button>
            </div>
          </div>
        </template>
      </div>

      <!-- Newsy -->
      <div class="landing-history-section" x-show="news.length > 0">
        <div class="landing-history-header">
          <h2>📰 Aktualności</h2>
          <span x-text="news.length + ' wpisów'"></span>
        </div>
        <div class="landing-history-grid">
          <template x-for="n in pagedNews" :key="n.id">
            <div class="pub-history-card" @click="expandedNews = n">
              <div class="pub-card-name" x-text="n.title"></div>
              <div style="font-size:.82rem;color:var(--muted);white-space:pre-wrap;line-height:1.5;margin-top:.3rem" x-text="newsTeaser(n.body)"></div>
              <div class="pub-card-meta" style="margin-top:.4rem" x-text="formatTime(n.created_at)"></div>
            </div>
          </template>
        </div>
        <div class="pagination" x-show="newsPageCount > 1">
          <button @click="newsPage > 1 && newsPage--" :disabled="newsPage === 1">&laquo;</button>
          <template x-for="p in newsPages()" :key="p">
            <button :class="{active: newsPage === p}" @click="newsPage = p" x-text="p"></button>
          </template>
          <button @click="newsPage < newsPageCount && newsPage++" :disabled="newsPage === newsPageCount">&raquo;</button>
        </div>
      </div>

      <!-- News Modal -->
      <div class="chart-modal-overlay" x-show="expandedNews" x-cloak @click="expandedNews = null" style="display:none">
        <div class="news-modal" @click.stop style="background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:600px;width:95%;max-height:80vh;overflow-y:auto;padding:1.5rem;cursor:default">
          <h2 x-text="expandedNews?.title" style="margin-bottom:.8rem"></h2>
          <div style="font-size:.9rem;color:var(--text);white-space:pre-wrap;line-height:1.6" x-text="expandedNews?.body"></div>
          <div class="pub-card-meta" x-text="formatTime(expandedNews?.created_at)" style="margin-top:1rem"></div>
        </div>
      </div>

      <!-- Publiczna historia -->
      <div class="landing-history-section">
        <div class="landing-history-header">
          <h2>📈 Ostatnie symulacje</h2>
          <span x-text="history.length + ' wyników'"></span>
          <div style="display:flex;gap:.3rem;margin-left:auto">
            <button class="tab" :class="{active: historySort==='date'}" @click="setHistorySort('date')" style="font-size:.72rem;padding:.2rem .5rem">Data</button>
            <button class="tab" :class="{active: historySort==='dps'}" @click="setHistorySort('dps')" style="font-size:.72rem;padding:.2rem .5rem">DPS</button>
            <button class="tab" :class="{active: historySort==='name'}" @click="setHistorySort('name')" style="font-size:.72rem;padding:.2rem .5rem">Postać</button>
          </div>
        </div>

        <template x-if="!pubResult || pubResult._source === 'addon'">
          <div>
            <template x-if="history.length === 0">
              <p style="color:var(--muted);font-size:.88rem">Brak publicznych symulacji.</p>
            </template>
            <div class="landing-history-grid">
              <template x-for="entry in pagedHistory" :key="entry.job_id">
                <div class="pub-history-card" @click="loadPubResult(entry.job_id)">
                  <div class="pub-card-name" x-text="entry.character_name || 'Addon Export'"></div>
                  <div class="pub-card-class" x-show="entry.character_class" :style="{color: classColor(entry.character_class)}" x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + (entry.character_class || '')"></div>
                  <div class="pub-card-dps" x-text="formatDps(entry.dps)"></div>
                  <div class="pub-card-meta" x-text="entry.fight_style + ' · ' + formatTime(entry.created_at)"></div>
                </div>
              </template>
            </div>
            <div class="pagination" x-show="historyPageCount > 1">
              <button @click="historyPage > 1 && historyPage--" :disabled="historyPage === 1">&laquo;</button>
              <template x-for="p in historyPages()" :key="p">
                <button :class="{active: historyPage === p}" @click="historyPage = p" x-text="p"></button>
              </template>
              <button @click="historyPage < historyPageCount && historyPage++" :disabled="historyPage === historyPageCount">&raquo;</button>
            </div>
          </div>
        </template>

        <template x-if="pubResult && pubResult._source !== 'addon'">
          <div>
            <button class="pub-result-back" @click="pubResult = null; pubJob = null">← Powrót do listy</button>
            <div class="panel">
              <div class="result-hero">
                <div class="dps-value" x-text="formatDps(pubResult.dps)"></div>
                <div class="dps-label" style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:center">
                  <span>DPS (±<span x-text="formatDps(pubResult.dps_std)"></span>)</span>
                  <template x-if="pubJob && pubJob.charName && armoryUrl(pubJob.realmSlug, pubJob.charName)">
                    <a :href="armoryUrl(pubJob.realmSlug, pubJob.charName)" target="_blank" rel="noopener"
                      :style="{background: classColor(pubJob.charClass), color: classTextColor(pubJob.charClass), padding: '.2rem .7rem', borderRadius: '999px', fontWeight: '700', fontSize: '.85rem', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '.3rem'}">
                      <span x-text="pubJob.charName + (pubJob.charSpec || pubJob.charClass ? ' · ' + (pubJob.charSpec ? pubJob.charSpec + ' ' : '') + (pubJob.charClass || '') : '')"></span>
                      <span style="font-size:.75rem;opacity:.8">↗</span>
                    </a>
                  </template>
                  <template x-if="!pubJob || !pubJob.charName"><span x-text="pubResult.name"></span></template>
                </div>
              </div>
              <div class="result-grid">
                <div>
                  <h2 style="margin-bottom:.6rem">Statystyki</h2>
                  <div class="stat-list">
                    <template x-for="[key, val] in Object.entries(pubResult.stats)" :key="key">
                      <div class="stat-row"><span class="stat-name" x-text="formatStatName(key)"></span><span class="stat-val" x-text="formatStatValue(key, val)"></span></div>
                    </template>
                  </div>
                </div>
                <div>
                  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
                    <h2>Breakdown spelli</h2>
                    <div style="display:flex;gap:.3rem">
                      <button class="tab" :class="{active: spellSort==='total_dmg'}" @click="spellSort='total_dmg'" style="font-size:.75rem;padding:.25rem .6rem">Total Dmg</button>
                      <button class="tab" :class="{active: spellSort==='dps'}" @click="spellSort='dps'" style="font-size:.75rem;padding:.25rem .6rem">DPS</button>
                    </div>
                  </div>
                  <div class="spell-list">
                    <template x-for="sp in pubSortedSpells" :key="sp.name">
                      <div class="spell-row" @mouseenter="hoveredSpell=sp.name" @mouseleave="hoveredSpell=null">
                        <div x-show="hoveredSpell===sp.name" class="spell-tooltip">
                          <div class="spell-tooltip-row"><span>Hits</span><span x-text="sp.count ?? '—'"></span></div>
                          <div class="spell-tooltip-row"><span>Avg hit</span><span x-text="formatDmg(sp.avg_hit)"></span></div>
                          <div class="spell-tooltip-row"><span>Crit</span><span x-text="(sp.crit_pct ?? '—') + '%'"></span></div>
                          <div class="spell-tooltip-row"><span>Miss / Dodge</span><span x-text="(sp.miss_pct ?? 0) + '%'"></span></div>
                        </div>
                        <div class="spell-head"><span x-text="sp.name"></span><span style="display:flex;gap:.6rem;align-items:center"><span x-show="spellSort==='total_dmg'"><strong x-text="formatDmg(sp.total_dmg)"></strong><span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dmg_pct + '%)'" ></span></span><span x-show="spellSort==='dps'"><strong x-text="formatDps(sp.dps)"></strong> DPS<span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dps_pct + '%)'" ></span></span><span style="color:var(--accent);font-size:.8rem" x-text="sp.crit_pct + '% crit'"></span></span></div>
                        <div class="spell-bar-bg"><div class="spell-bar-fill" :style="{width: pctBarWidth(sp[spellSort], pubSortedSpells, spellSort)}"></div></div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
              <div class="chart-section"><h2>🥧 DPS Pie Chart</h2><img class="dps-chart-img" :src="'/api/result/' + pubJob.id + '/dps-chart.png?t=' + Date.now()" alt="DPS Chart" @click="chartModal = $el.src" loading="lazy"/></div>
              <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted);align-items:center">
                <a :href="'/api/result/' + pubJob.id + '/json'" target="_blank" style="color:var(--muted)">Raw JSON</a>
                <span style="color:var(--border)">·</span>
                <button class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;margin:0" @click="copyToClipboard(getShareUrl(pubJob.id), pubJob.id)" x-text="copiedJobId === pubJob.id ? '✓ Skopiowano' : '🔗 Udostępnij'"></button>
              </div>
            </div>
          </div>
        </template>
      </div>

    </div>
  </template>

  <!-- SYMULACJE VIEW (logged in) -->
  <template x-if="currentView === 'symulacje' && sessionId">
    <div class="grid">
      <div class="panel">
        <h2>Postacie</h2>
        <template x-if="loadingChars"><div style="text-align:center;padding:2rem"><span class="spinner"></span></div></template>
        <template x-if="errorChars"><p style="color:#f66;font-size:.85rem" x-text="errorChars"></p></template>
        <template x-if="!loadingChars && !errorChars && characters.length === 0">
          <div style="text-align:center;padding:1.5rem 1rem;color:var(--muted)">
            <div style="font-size:2rem;margin-bottom:.5rem">👤</div>
            <p style="font-size:.9rem;margin-bottom:.3rem">Brak postaci WoW na tym koncie.</p>
            <p style="font-size:.8rem">Postacie muszą mieć co najmniej level 10, lub skorzystaj z trybu <strong>Addon Export</strong>.</p>
          </div>
        </template>
        <template x-if="!loadingChars && characters.length">
          <div>
            <input class="search" placeholder="Szukaj postaci..." x-model="charFilter"/>
            <div class="char-list">
              <template x-for="ch in filteredChars" :key="ch.id">
                <div class="char-item" :class="{active: selectedChar && selectedChar.id === ch.id}" @click="selectChar(ch)">
                  <img class="char-avatar" :src="ch.avatar || '/static/default_avatar.png'" :alt="ch.name"/>
                  <div>
                    <div class="char-name" x-text="ch.name"></div>
                    <div class="char-meta">
                      <span x-text="ch.realm + ' · lv' + ch.level"></span>
                      <span x-show="ch.class" :style="{color: classColor(ch.class), fontWeight: '600'}" x-text="' · ' + (ch.spec ? ch.spec + ' ' : '') + ch.class"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <div>
        <div class="panel" style="margin-bottom:1rem">
          <h2>Symulacja</h2>
          <div class="sim-tabs">
            <button class="tab" :class="{active: simMode==='addon'}" @click="simMode='addon'">📋 Addon Export</button>
            <button class="tab" :class="{active: simMode==='armory'}" @click="simMode='armory'">🌐 Armory</button>
          </div>
          <template x-if="simMode==='addon'"><textarea class="addon-box" placeholder="Wklej tutaj output z addona SimulationCraft (/simc w grze)..." x-model="addonText"></textarea></template>
          <template x-if="simMode==='armory'">
            <div style="margin-bottom:.8rem">
              <template x-if="selectedChar"><p style="font-size:.9rem">Wybrana postać: <strong x-text="selectedChar.name + ' – ' + selectedChar.realm"></strong><span x-show="selectedChar.class" :style="{color: classColor(selectedChar.class)}" x-text="' · ' + (selectedChar.spec ? selectedChar.spec + ' ' : '') + selectedChar.class"></span></p></template>
              <template x-if="!selectedChar && characters.length"><p style="font-size:.88rem;color:var(--muted)">← Wybierz postać z listy po lewej</p></template>
              <template x-if="!selectedChar && !characters.length"><p style="font-size:.88rem;color:var(--muted)">Brak postaci — skorzystaj z trybu <strong>Addon Export</strong>.</p></template>
            </div>
          </template>
          <div class="sim-options">
            <div class="sim-option"><label>Styl walki</label><select x-model="simOptions.fight_style"><option value="Patchwerk">Patchwerk</option><option value="HecticAddCleave">HecticAddCleave</option><option value="LightMovement">LightMovement</option><option value="HeavyMovement">HeavyMovement</option></select></div>
            <div class="sim-option"><label>Iteracje</label><input type="number" x-model.number="simOptions.iterations" min="100" max="10000" step="100"/></div>
            <div class="sim-option"><label>Target Error %</label><input type="number" x-model.number="simOptions.target_error" min="0.1" max="5" step="0.1"/></div>
          </div>
          <button class="btn btn-primary" @click="startSim()" :disabled="loadingSim">
            <span x-show="loadingSim" class="spinner"></span>
            <span x-show="!loadingSim">▶ Uruchom symulację</span>
          </button>
          <p x-show="job && job.status === 'running'" style="margin-top:.6rem;font-size:.85rem;color:var(--muted)">⏳ Symulacja w toku… (job: <span x-text="job?.id?.slice(0,8)"></span>…)</p>
        </div>

        <template x-if="simResult">
          <div class="panel">
            <div class="result-hero">
              <div class="dps-value" x-text="formatDps(simResult.dps)"></div>
              <div class="dps-label" style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;justify-content:center">
                <span>DPS (±<span x-text="formatDps(simResult.dps_std)"></span>)</span>
                <template x-if="job.charName">
                  <a :href="armoryUrl(job.realmSlug, job.charName)" target="_blank" rel="noopener"
                    :style="{background: classColor(job.charClass), color: classTextColor(job.charClass), padding: '.2rem .7rem', borderRadius: '999px', fontWeight: '700', fontSize: '.85rem', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '.3rem'}">
                    <span x-text="job.charName + (job.charSpec || job.charClass ? ' · ' + (job.charSpec ? job.charSpec + ' ' : '') + (job.charClass || '') : '')"></span>
                    <span style="font-size:.75rem;opacity:.8">↗</span>
                  </a>
                </template>
                <template x-if="!job.charName"><span x-text="simResult.name"></span></template>
              </div>
            </div>
            <div class="result-grid">
              <div>
                <h2 style="margin-bottom:.6rem">Statystyki</h2>
                <div class="stat-list">
                  <template x-for="[key, val] in Object.entries(simResult.stats)" :key="key">
                    <div class="stat-row"><span class="stat-name" x-text="formatStatName(key)"></span><span class="stat-val" x-text="formatStatValue(key, val)"></span></div>
                  </template>
                </div>
              </div>
              <div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
                  <h2>Breakdown spelli</h2>
                  <div style="display:flex;gap:.3rem">
                    <button class="tab" :class="{active: spellSort==='total_dmg'}" @click="spellSort='total_dmg'" style="font-size:.75rem;padding:.25rem .6rem">Total Dmg</button>
                    <button class="tab" :class="{active: spellSort==='dps'}" @click="spellSort='dps'" style="font-size:.75rem;padding:.25rem .6rem">DPS</button>
                  </div>
                </div>
                <div class="spell-list">
                  <template x-for="sp in sortedSpells" :key="sp.name">
                    <div class="spell-row" @mouseenter="hoveredSpell=sp.name" @mouseleave="hoveredSpell=null">
                      <div x-show="hoveredSpell===sp.name" class="spell-tooltip">
                        <div class="spell-tooltip-row"><span>Hits</span><span x-text="sp.count ?? '—'"></span></div>
                        <div class="spell-tooltip-row"><span>Avg hit</span><span x-text="formatDmg(sp.avg_hit)"></span></div>
                        <div class="spell-tooltip-row"><span>Crit</span><span x-text="(sp.crit_pct ?? '—') + '%'"></span></div>
                        <div class="spell-tooltip-row"><span>Miss / Dodge</span><span x-text="(sp.miss_pct ?? 0) + '%'"></span></div>
                      </div>
                      <div class="spell-head"><span x-text="sp.name"></span><span style="display:flex;gap:.6rem;align-items:center"><span x-show="spellSort==='total_dmg'"><strong x-text="formatDmg(sp.total_dmg)"></strong><span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dmg_pct + '%)'"></span></span><span x-show="spellSort==='dps'"><strong x-text="formatDps(sp.dps)"></strong> DPS<span style="color:var(--muted);font-size:.8rem" x-text="' (' + sp.dps_pct + '%)'"></span></span><span style="color:var(--accent);font-size:.8rem" x-text="sp.crit_pct + '% crit'"></span></span></div>
                      <div class="spell-bar-bg"><div class="spell-bar-fill" :style="{width: pctBarWidth(sp[spellSort], sortedSpells, spellSort)}"></div></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
            <div class="chart-section"><h2>🥧 DPS Pie Chart</h2><img class="dps-chart-img" :src="'/api/result/' + job.id + '/dps-chart.png?t=' + Date.now()" alt="DPS Chart" @click="chartModal = $el.src" loading="lazy"/></div>
            <div style="margin-top:1rem;display:flex;gap:.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--muted);align-items:center">
              <a :href="'/api/result/' + job.id + '/json'" target="_blank" style="color:var(--muted)">Raw JSON</a>
              <span style="color:var(--border)">·</span>
              <button class="btn" style="font-size:.75rem;padding:.35rem .8rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;margin:0" @click="copyToClipboard(getShareUrl(job.id), job.id)" x-text="copiedJobId === job.id ? '✓ Skopiowano' : '🔗 Udostępnij'"></button>
            </div>
          </div>
        </template>
      </div>

      <!-- Historia boczna -->
      <div class="panel" style="max-height:800px;display:flex;flex-direction:column">
        <h2>Historia</h2>
        <div class="history-sort-bar">
          <button :class="{active: historySort==='date'}" @click="setHistorySort('date')">Data</button>
          <button :class="{active: historySort==='dps'}" @click="setHistorySort('dps')">DPS ↓</button>
          <button :class="{active: historySort==='name'}" @click="setHistorySort('name')">Postać</button>
        </div>
        <div x-show="history.length === 0" style="color:var(--muted);text-align:center;padding:1rem;font-size:.85rem">Brak symulacji</div>
        <div x-show="history.length > 0" class="history-list" style="flex:1">
          <template x-for="entry in pagedHistory" :key="entry.job_id">
            <div class="history-item" :class="{active: selectedHistory === entry.job_id}" style="cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
              <div style="flex:1;min-width:0" @click="loadHistoryResult(entry.job_id)">
                <div class="history-char">
                  <span x-text="entry.character_name || 'Addon Export'"></span>
                  <span x-show="entry.character_class" :style="{color: classColor(entry.character_class), fontWeight:'600', fontSize:'.8rem', marginLeft:'.3rem'}" x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + entry.character_class"></span>
                </div>
                <div class="history-dps" x-text="formatDps(entry.dps)"></div>
                <div class="history-time" x-text="formatTime(entry.created_at)"></div>
                <div class="history-style" x-text="entry.fight_style"></div>
              </div>
              <button class="btn" style="font-size:.7rem;padding:.25rem .5rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;flex-shrink:0" @click.stop="copyToClipboard(getShareUrl(entry.job_id), entry.job_id)" x-text="copiedJobId === entry.job_id ? '✓' : '🔗'" title="Skopiuj link"></button>
            </div>
          </template>
        </div>
        <div class="pagination" x-show="historyPageCount > 1">
          <button @click="historyPage > 1 && historyPage--" :disabled="historyPage === 1">&laquo;</button>
          <template x-for="p in historyPages()" :key="p">
            <button :class="{active: historyPage === p}" @click="historyPage = p" x-text="p"></button>
          </template>
          <button @click="historyPage < historyPageCount && historyPage++" :disabled="historyPage === historyPageCount">&raquo;</button>
        </div>
      </div>
    </div>
  </template>

  <!-- PROFIL VIEW (logged in) -->
  <template x-if="currentView === 'profil' && sessionId">
    <div style="max-width:1200px;margin:0 auto;padding:1rem">
      <div class="sim-tabs" style="margin-bottom:1rem">
        <button class="tab" :class="{active: profileTab==='chars'}" @click="profileTab='chars'">Postacie</button>
        <button class="tab" :class="{active: profileTab==='history'}" @click="profileTab='history'; loadHistory()">Historia</button>
      </div>
      
      <template x-if="profileTab==='chars'">
      <div>
        <h2 style="margin-bottom:1rem">👤 Twoje Postacie</h2>
      <div class="char-grid">
        <template x-for="char in characters" :key="char.id">
          <div class="char-card" @click="openCharDetails(char)">
            <div class="char-card-header">
              <img class="char-card-avatar" :src="char.avatar || '/static/default_avatar.png'" :alt="char.name"/>
              <div class="char-card-info">
                <div class="char-card-name" x-text="char.name"></div>
                <div class="char-card-meta" x-text="char.realm + ' · lv' + char.level"></div>
                <div class="char-card-meta" :style="{color: classColor(char.class)}" x-text="(char.spec ? char.spec + ' ' : '') + (char.class || '')"></div>
              </div>
            </div>
            <template x-if="getCharDps(char.name)">
              <div>
                <div class="char-card-dps" x-text="formatDps(getCharDps(char.name).latest)"></div>
                <div class="char-card-dps-small" x-text="getCharDps(char.name).trend"></div>
                <div style="margin-top:.5rem;font-size:.75rem;color:var(--muted)" x-text="getCharDps(char.name).count + ' symulacji · ' + formatTime(getCharDps(char.name).lastSim)"></div>
              </div>
            </template>
            <template x-if="!getCharDps(char.name)">
              <div style="color:var(--muted);font-size:.85rem">Brak symulacji</div>
            </template>
          </div>
        </template>
      </div>
      <template x-if="characters.length === 0">
        <div style="text-align:center;padding:3rem;color:var(--muted)">
          <p>Brak postaci do wyświetlenia.</p>
          <p style="font-size:.85rem">Twoje postacie WoW pojawią się automatycznie po zalogowaniu.</p>
        </div>
      </template>
      </div>
      </template>

      <template x-if="profileTab==='history'">
      <div>
        <h2 style="margin-bottom:1rem">📜 Historia symulacji</h2>
        <div class="history-sort-bar">
          <button :class="{active: historySort==='date'}" @click="setHistorySort('date')">Data</button>
          <button :class="{active: historySort==='dps'}" @click="setHistorySort('dps')">DPS ↓</button>
          <button :class="{active: historySort==='name'}" @click="setHistorySort('name')">Postać</button>
        </div>
        <div x-show="history.length === 0" style="color:var(--muted);text-align:center;padding:2rem;font-size:.85rem">Brak symulacji</div>
        <div x-show="history.length > 0" class="history-list" style="max-height:500px;overflow-y:auto">
          <template x-for="entry in pagedHistory" :key="entry.job_id">
            <div class="history-item" :class="{active: selectedHistory === entry.job_id}" style="cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
              <div style="flex:1;min-width:0" @click="loadHistoryResult(entry.job_id)">
                <div class="history-char">
                  <span x-text="entry.character_name || 'Addon Export'"></span>
                  <span x-show="entry.character_class" :style="{color: classColor(entry.character_class), fontWeight:'600', fontSize:'.8rem', marginLeft:'.3rem'}" x-text="(entry.character_spec ? entry.character_spec + ' ' : '') + entry.character_class"></span>
                </div>
                <div class="history-dps" x-text="formatDps(entry.dps)"></div>
                <div class="history-time" x-text="formatTime(entry.created_at)"></div>
                <div class="history-style" x-text="entry.fight_style"></div>
              </div>
              <button class="btn" style="font-size:.7rem;padding:.25rem .5rem;background:var(--accent2);color:#fff;border:none;border-radius:4px;cursor:pointer;flex-shrink:0" @click.stop="copyToClipboard(getShareUrl(entry.job_id), entry.job_id)" x-text="copiedJobId === entry.job_id ? '✓' : '🔗'" title="Skopiuj link"></button>
            </div>
          </template>
        </div>
        <div class="pagination" x-show="historyPageCount > 1" style="margin-top:1rem">
          <button @click="historyPage > 1 && historyPage--">&laquo;</button>
          <template x-for="p in historyPages()" :key="p">
            <button :class="{active: historyPage === p}" x-text="p" @click="historyPage = p"></button>
          </template>
          <button @click="historyPage < historyPageCount && historyPage++">&raquo;</button>
        </div>
      </div>
      </template>
    </div>
  </template>

  <!-- CHAR DETAILS MODAL -->
  <template x-if="charDetailsModal">
    <div class="chart-modal-overlay" @click="closeCharDetails()" style="display:flex;align-items:center;justify-content:center">
      <div @click.stop style="background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:900px;width:95%;max-height:90vh;overflow-y:auto;padding:1.5rem;cursor:default">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <div style="display:flex;align-items:center;gap:1rem">
            <img :src="charDetailsModal.avatar || '/static/default_avatar.png'" style="width:64px;height:64px;border-radius:8px"/>
            <div>
              <h2 style="margin:0" x-text="charDetailsModal.name"></h2>
              <div style="color:var(--muted);font-size:.9rem" x-text="charDetailsModal.realm + ' · lv' + charDetailsModal.level + ' · ' + (charDetailsModal.spec ? charDetailsModal.spec + ' ' : '') + charDetailsModal.class"></div>
            </div>
          </div>
          <button @click="closeCharDetails()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted)">&times;</button>
        </div>

        <template x-if="loadingCharDetails">
          <div style="text-align:center;padding:2rem;color:var(--muted)">Ładowanie...</div>
        </template>

        <template x-if="charDetailsError">
          <div style="text-align:center;padding:2rem;color:#f66" x-text="'Błąd: ' + charDetailsError"></div>
        </template>

        <template x-if="!loadingCharDetails && !charDetailsError">
          <div>
            <!-- Gear -->
            <h3 style="margin:1rem 0 .5rem">🎒 Gear</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem">
              <template x-for="item in charEquipment" :key="item.slot">
                <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem;font-size:.8rem">
                  <div style="color:var(--muted);font-size:.7rem;text-transform:uppercase;margin-bottom:.2rem" x-text="item.slot"></div>
                  <div :style="{color: getItemQualityColor(item.quality)}" x-text="item.name"></div>
                  <div style="color:var(--accent);font-size:.75rem" x-text="'ilvl ' + item.level"></div>
                  <template x-for="stat in item.stats.slice(0,3)" :key="stat.type">
                    <div style="font-size:.7rem;color:var(--muted)" x-text="stat.type + ': ' + stat.value"></div>
                  </template>
                </div>
              </template>
            </div>

            <!-- Talents -->
            <template x-if="charTalents.length > 0">
              <div>
                <h3 style="margin:1rem 0 .5rem">✨ Talenty</h3>
                <div style="display:flex;gap:.5rem;flex-wrap:wrap">
                  <template x-for="talent in charTalents" :key="talent.tier">
                    <div style="width:50px;height:50px;background:var(--bg);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center" :title="talent.spell?.name">
                      <template x-if="talent.spell">
                        <img :src="'https://render.worldofwarcraft.com/eu/icons/56/' + talent.spell.icon + '.jpg'" style="width:40px;height:40px;border-radius:4px"/>
                      </template>
                      <template x-if="!talent.spell">
                        <div style="width:40px;height:40px;background:var(--border);border-radius:4px"></div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Statistics -->
            <template x-if="Object.keys(charStatistics).length > 0">
              <div>
                <h3 style="margin:1rem 0 .5rem">📊 Statystyki</h3>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.5rem">
                  <template x-for="[key, val] in Object.entries(charStatistics)" :key="key">
                    <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem;font-size:.8rem">
                      <div style="color:var(--muted);font-size:.7rem" x-text="key"></div>
                      <div x-text="typeof val === 'number' ? val.toLocaleString() : val"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- DPS Trend Chart -->
            <div>
              <h3 style="margin:1rem 0 .5rem">📈 DPS w czasie</h3>
              <div id="dps-trend-chart" style="width:100%;height:300px;background:var(--bg);border:1px solid var(--border);border-radius:8px;"></div>
            </div>
          </div>
        </template>

        <div style="margin-top:1.5rem;display:flex;gap:.5rem">
          <button class="btn btn-primary" @click="selectChar(charDetailsModal); closeCharDetails()">🏃 Uruchom symulację</button>
        </div>
      </div>
    </div>
  </template>

</div>
</body>
</html>
