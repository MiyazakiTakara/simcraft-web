<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimCraft Web — Symulator DPS dla WoW</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <meta name="description" content="Darmowy symulator DPS dla World of Warcraft. Zaloguj się przez Battle.net i sprawdz DPS swojej postaci."/>
  <meta property="og:title"       content="SimCraft Web — Symulator DPS dla WoW"/>
  <meta property="og:description" content="Darmowy symulator DPS dla World of Warcraft oparty na SimulationCraft."/>
  <meta property="og:type"        content="website"/>
  <meta property="og:url"         content="https://sim.miyazakitakara.ovh"/>
  <meta property="og:image"       content="https://sim.miyazakitakara.ovh/static/og-image.png"/>
  <meta name="twitter:card"       content="summary_large_image"/>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var session = params.get('session');
      if (session) {
        localStorage.setItem('simcraft_session', session);
        history.replaceState({}, '', '/');
      }
      var theme = localStorage.getItem('simcraft_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
    })();
  </script>

  <link rel="stylesheet" href="/style.css?v=7"/>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="/api.js?v=3"></script>
  <script src="/app.js?v=24"></script>
</head>
<body>
<div x-data="app()" x-init="init()" class="container">

  <!-- Modal powiększenia chartu -->
  <div class="chart-modal-overlay" x-show="chartModal" x-cloak @click="chartModal=false" style="display:none">
    <img :src="chartModal" alt="DPS Chart"/>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-logo" style="cursor:pointer" @click="navigateTo('home')" x-text="appearance.emoji + ' ' + appearance.header_title">⚔️ SimCraft Web</div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="theme-toggle" @click="toggleTheme()" :title="theme === 'dark' ? 'Przełącz na jasny' : 'Przełącz na ciemny'">
        <span x-text="theme === 'dark' ? '☀️' : '🌙'"></span>
      </button>
      <template x-if="sessionId">
        <div class="header-user">
          <button class="btn btn-ghost" style="font-size:.85rem;padding:.4rem .8rem" @click="navigateTo('symulacje')">⚔️ Symulacje</button>
          <button class="btn btn-ghost" style="font-size:.85rem;padding:.4rem .8rem" @click="navigateTo('profil')">👤 Profil</button>
          <span class="header-badge" x-text="characters.length + ' postaci'"></span>
          <button class="btn btn-ghost" @click="logout()">Wyloguj</button>
        </div>
      </template>
      <template x-if="!sessionId">
        <a href="/auth/login" class="btn btn-login" style="font-size:.88rem;padding:.45rem 1.1rem">🔑 Zaloguj</a>
      </template>
    </div>
  </header>

  <!-- Kontener widoków — wypełniany dynamicznie przez loadView() -->
  <div id="view-container"></div>

  <!-- CHAR DETAILS MODAL (globalny, ponad widokami) -->
  <template x-if="charDetailsModal">
    <div class="chart-modal-overlay" @click="closeCharDetails()" style="display:flex;align-items:center;justify-content:center">
      <div @click.stop style="background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:900px;width:95%;max-height:90vh;overflow-y:auto;padding:1.5rem;cursor:default">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <div style="display:flex;align-items:center;gap:1rem">
            <img :src="charDetailsModal.avatar || '/static/default_avatar.png'" style="width:64px;height:64px;border-radius:8px"/>
            <div>
              <h2 style="margin:0" x-text="charDetailsModal.name"></h2>
              <div style="color:var(--muted);font-size:.9rem" x-text="charDetailsModal.realm + ' · lv' + charDetailsModal.level + ' · ' + (charDetailsModal.spec ? charDetailsModal.spec + ' ' : '') + charDetailsModal.class"></div>
            </div>
          </div>
          <button @click="closeCharDetails()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted)">&times;</button>
        </div>

        <template x-if="loadingCharDetails">
          <div style="text-align:center;padding:2rem;color:var(--muted)">Ładowanie...</div>
        </template>
        <template x-if="charDetailsError">
          <div style="text-align:center;padding:2rem;color:#f66" x-text="'Błąd: ' + charDetailsError"></div>
        </template>

        <template x-if="!loadingCharDetails && !charDetailsError">
          <div>
            <h3 style="margin:1rem 0 .5rem">🎒 Gear</h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem">
              <template x-for="item in charEquipment" :key="item.slot">
                <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem;font-size:.8rem;position:relative"
                     @mouseenter="showItemTooltip($event, item)"
                     @mouseleave="hideItemTooltip()">
                  <div style="color:var(--muted);font-size:.7rem;text-transform:uppercase;margin-bottom:.2rem" x-text="item.slot"></div>
                  <div :style="{color: getItemQualityColor(item.quality)}" x-text="item.name"></div>
                  <template x-if="item.description">
                    <div style="font-size:.7rem;color:var(--muted);font-style:italic;margin-top:.2rem" x-text="item.description"></div>
                  </template>
                  <div style="color:var(--accent);font-size:.75rem" x-text="'ilvl ' + item.level"></div>
                  <template x-for="stat in item.stats.slice(0,3)" :key="stat.type">
                    <div style="font-size:.7rem;color:var(--muted)" x-text="stat.type + ': ' + stat.value"></div>
                  </template>
                </div>
              </template>
            </div>

            <template x-if="charTalents.length > 0">
              <div>
                <h3 style="margin:1rem 0 .5rem">✨ Talenty</h3>
                <div style="display:flex;gap:.5rem;flex-wrap:wrap">
                  <template x-for="talent in charTalents" :key="talent.tier">
                    <div style="width:50px;height:50px;background:var(--bg);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center" :title="talent.spell?.name">
                      <template x-if="talent.spell">
                        <img :src="'https://render.worldofwarcraft.com/eu/icons/56/' + talent.spell.icon + '.jpg'" style="width:40px;height:40px;border-radius:4px"/>
                      </template>
                      <template x-if="!talent.spell">
                        <div style="width:40px;height:40px;background:var(--border);border-radius:4px"></div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <div>
              <h3 style="margin:1rem 0 .5rem">📈 DPS w czasie</h3>
              <div id="dps-trend-chart" style="width:100%;height:300px;background:var(--bg);border:1px solid var(--border);border-radius:8px;"></div>
            </div>
          </div>
        </template>

        <div style="margin-top:1.5rem;display:flex;gap:.5rem">
          <button class="btn btn-primary" @click="selectChar(charDetailsModal); closeCharDetails()">🏃 Uruchom symulację</button>
        </div>
      </div>
    </div>
  </template>

</div>

<div id="item-tooltip" class="item-tooltip" style="display:none;"></div>

</body>
</html>
