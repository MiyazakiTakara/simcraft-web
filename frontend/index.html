<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimCraft Web — WoW DPS Simulator</title>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>

  <meta name="description" content="Free DPS simulator for World of Warcraft. Log in via Battle.net and check your character's DPS."/>
  <meta property="og:title"       content="SimCraft Web — WoW DPS Simulator"/>
  <meta property="og:description" content="Free DPS simulator for World of Warcraft powered by SimulationCraft."/>
  <meta property="og:type"        content="website"/>
  <meta property="og:url"         content="https://sim.miyazakitakara.ovh"/>
  <meta property="og:image"       content="https://sim.miyazakitakara.ovh/static/og-image.png"/>
  <meta name="twitter:card"       content="summary_large_image"/>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var session = params.get('session');
      if (session) {
        localStorage.setItem('simcraft_session', session);
        history.replaceState({}, '', '/');
      }
      var theme = localStorage.getItem('simcraft_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
    })();
  </script>

  <link rel="stylesheet" href="/style.css?v=9"/>
  <script src="/i18n.js?v=1"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/api.js?v=3"></script>
  <script src="/utils.js?v=2"></script>
  <script src="/sim.js?v=2"></script>
  <script src="/chars.js?v=4"></script>
  <script src="/history.js?v=2"></script>
  <script src="/settings.js?v=7"></script>
  <script src="/header.js?v=2"></script>
  <script src="/app.js?v=32"></script>
  <script src="/partials.js?v=1"></script>
</head>
<body>
<div x-data="app()" x-init="init()" class="container">

  <!-- Modal powiększenia chartu -->
  <div class="chart-modal-overlay" x-show="chartModal" x-cloak @click="chartModal=false" style="display:none">
    <img :src="chartModal" alt="DPS Chart"/>
  </div>

  <!-- FIRST LOGIN MODAL — wybór głównej postaci -->
  <template x-if="showMainCharModal">
    <div class="chart-modal-overlay" style="display:flex;align-items:center;justify-content:center;z-index:1000">
      <div @click.stop style="background:var(--bg);border:1px solid var(--border);border-radius:14px;max-width:560px;width:95%;max-height:85vh;overflow-y:auto;padding:2rem;cursor:default">
        <div style="text-align:center;margin-bottom:1.5rem">
          <div style="font-size:2rem;margin-bottom:.5rem">⚔️</div>
          <h2 style="margin:0 0 .4rem" x-text="$store.i18n.t('main_char.title')">Wybierz główną postać</h2>
          <p style="color:var(--muted);font-size:.9rem;margin:0" x-text="$store.i18n.t('main_char.subtitle')">Twoja główna postać będzie widoczna na profilu publicznym. Zawsze możesz to zmienić w ustawieniach.</p>
        </div>

        <template x-if="loadingChars">
          <div style="text-align:center;padding:2rem;color:var(--muted)">⏳ Ładowanie postaci...</div>
        </template>

        <template x-if="!loadingChars && characters.length === 0">
          <div style="text-align:center;padding:2rem;color:var(--muted)">Brak postaci do wyświetlenia.</div>
        </template>

        <div style="display:flex;flex-direction:column;gap:.5rem;max-height:50vh;overflow-y:auto">
          <template x-for="ch in characters.slice(0,20)" :key="ch.id">
            <button
              @click="saveMainChar(ch)"
              :disabled="savingMainChar"
              style="display:flex;align-items:center;gap:.9rem;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;cursor:pointer;text-align:left;transition:border-color .15s"
              :style="mainChar && mainChar.name === ch.name ? 'border-color:var(--accent)' : ''"
              onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor= (this.getAttribute('data-selected')==='1') ? 'var(--accent)' : 'var(--border)'"
            >
              <img :src="ch.avatar || '/static/default_avatar.png'" style="width:44px;height:44px;border-radius:6px;flex-shrink:0"/>
              <div>
                <div style="font-weight:600" x-text="ch.name"></div>
                <div style="font-size:.8rem;color:var(--muted)" x-text="ch.realm + ' · ' + $store.i18n.t('chars.level_short') + ch.level + ' · ' + (ch.spec ? ch.spec + ' ' : '') + ch.class"></div>
              </div>
              <template x-if="mainChar && mainChar.name === ch.name">
                <span style="margin-left:auto;color:var(--accent);font-size:1.1rem">✔</span>
              </template>
            </button>
          </template>
        </div>

        <div style="margin-top:1.5rem;display:flex;justify-content:flex-end">
          <button
            @click="skipMainCharModal()"
            style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:.4rem .8rem"
            x-text="$store.i18n.t('main_char.skip')"
          >Pomin na teraz</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Shared header (partial) -->
  <div id="site-header"></div>

  <!-- Kontener widoków -->
  <div id="view-container"></div>

  <!-- Shared footer (partial) -->
  <div id="site-footer"></div>

  <!-- CHAR DETAILS MODAL -->
  <template x-if="charDetailsModal">
    <div class="chart-modal-overlay" @click="closeCharDetails()" style="display:flex;align-items:center;justify-content:center">
      <div @click.stop style="background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:900px;width:95%;max-height:90vh;overflow-y:auto;padding:1.5rem;cursor:default">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <div style="display:flex;align-items:center;gap:1rem">
            <img :src="charDetailsModal.avatar || '/static/default_avatar.png'" style="width:64px;height:64px;border-radius:8px"/>
            <div>
              <h2 style="margin:0" x-text="charDetailsModal.name"></h2>
              <div style="color:var(--muted);font-size:.9rem" x-text="charDetailsModal.realm + ' · ' + $store.i18n.t('chars.level_short') + charDetailsModal.level + ' · ' + (charDetailsModal.spec ? charDetailsModal.spec + ' ' : '') + charDetailsModal.class"></div>
            </div>
          </div>
          <button @click="closeCharDetails()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted)">&times;</button>
        </div>
        <template x-if="loadingCharDetails">
          <div style="text-align:center;padding:2rem;color:var(--muted)" x-text="$store.i18n.t('common.loading')"></div>
        </template>
        <template x-if="charDetailsError">
          <div style="text-align:center;padding:2rem;color:#f66" x-text="$store.i18n.t('common.error_prefix') + charDetailsError"></div>
        </template>
        <template x-if="!loadingCharDetails && !charDetailsError">
          <div>
            <h3 style="margin:1rem 0 .5rem" x-text="$store.i18n.t('chars.gear_title')"></h3>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem">
              <template x-for="item in charEquipment" :key="item.slot">
                <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem;font-size:.8rem;position:relative"
                     @mouseenter="showItemTooltip($event, item)" @mouseleave="hideItemTooltip()">
                  <div style="color:var(--muted);font-size:.7rem;text-transform:uppercase;margin-bottom:.2rem" x-text="item.slot"></div>
                  <div :style="{color: getItemQualityColor(item.quality)}" x-text="item.name"></div>
                  <template x-if="item.description">
                    <div style="font-size:.7rem;color:var(--muted);font-style:italic;margin-top:.2rem" x-text="item.description"></div>
                  </template>
                  <div style="color:var(--accent);font-size:.75rem" x-text="'ilvl ' + item.level"></div>
                  <template x-for="stat in item.stats.slice(0,3)" :key="stat.type">
                    <div style="font-size:.7rem;color:var(--muted)" x-text="stat.type + ': ' + stat.value"></div>
                  </template>
                </div>
              </template>
            </div>
            <template x-if="charTalents.length > 0">
              <div>
                <h3 style="margin:1rem 0 .5rem" x-text="$store.i18n.t('chars.talents_title')"></h3>
                <div style="display:flex;gap:.5rem;flex-wrap:wrap">
                  <template x-for="talent in charTalents" :key="talent.tier">
                    <div style="width:50px;height:50px;background:var(--bg);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center" :title="talent.spell?.name">
                      <template x-if="talent.spell">
                        <img :src="'https://render.worldofwarcraft.com/eu/icons/56/' + talent.spell.icon + '.jpg'" style="width:40px;height:40px;border-radius:4px"/>
                      </template>
                      <template x-if="!talent.spell">
                        <div style="width:40px;height:40px;background:var(--border);border-radius:4px"></div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <div>
              <h3 style="margin:1rem 0 .5rem" x-text="$store.i18n.t('chars.dps_trend_title')"></h3>
              <div id="dps-trend-chart" style="width:100%;height:300px;background:var(--bg);border:1px solid var(--border);border-radius:8px;"></div>
            </div>
          </div>
        </template>
        <div style="margin-top:1.5rem;display:flex;gap:.5rem">
          <button class="btn btn-primary" @click="selectChar(charDetailsModal); closeCharDetails()" x-text="$store.i18n.t('chars.simulate')"></button>
          <button class="btn btn-secondary" @click="saveMainChar(charDetailsModal)" x-text="$store.i18n.t('main_char.set_as_main')"></button>
        </div>
      </div>
    </div>
  </template>

</div>

<div id="item-tooltip" class="item-tooltip" style="display:none;"></div>

</body>
</html>
